<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başvuru Formu | BLI Esports</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #141414; padding: 40px; border-radius: 15px; border: 1px solid #ff0000; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        h2 { color: #ff0000; margin-bottom: 20px; letter-spacing: 2px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff0000; }
        button { width: 100%; padding: 15px; background: #ff0000; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #cc0000; }
        .footer-link { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>BAŞVURU YAP</h2>
    <form id="formBli" action="https://formspree.io/f/mojnyoqb" method="POST">
        <input type="text" name="isim" id="ad_soyad" placeholder="Ad Soyad" required>
        <input type="text" name="discord" id="discord_id" placeholder="Discord ID" required>
        <select name="brans" id="secilen_brans">
            <option value="Valorant Oyuncusu">Valorant Oyuncusu</option>
            <option value="Editör">Editör</option>
            <option value="Tasarımcı">Tasarımcı</option>
        </select>
        <textarea name="mesaj" placeholder="Neden sizi seçmeliyiz?" rows="4"></textarea>
        
        <input type="hidden" name="_next" value="https://bliesports.github.io">
        
        <button type="submit">GÖNDER</button>
    </form>
    <a href="../index.html" class="footer-link">Vazgeç ve Geri Dön</a>
</div>

<script>
    document.getElementById("formBli").onsubmit = function() {
        // Form gönderilirken verileri tarayıcı hafızasına (LocalStorage) kaydet
        const basvuruBilgisi = {
            isim: document.getElementById("ad_soyad").value,
            brans: document.getElementById("secilen_brans").value,
            tarih: new Date().toLocaleDateString()
        };
        
        // Bu anahtarı ana sayfa kontrol edecek
        localStorage.setItem("bli_basvuru_tamamlandi", JSON.stringify(basvuruBilgisi));
    };
</script>

</body>
</html>
