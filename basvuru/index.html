<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI Esports | Elite Recruitment</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bli-red: #ff3333;
            --primary-black: #000000;
            --pure-white: #ffffff;
            --bg-light: #f8f9fa;
            --transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-light);
            color: var(--primary-black);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        /* Arka planı ana sayfadaki gibi sade yapıyoruz */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at top right, rgba(255,51,51,0.05), transparent);
            z-index: -1;
        }

        .bli-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px 50px;
            width: 100%; max-width: 600px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-area { text-align: center; margin-bottom: 45px; }
        .header-area img { height: 55px; margin-bottom: 20px; }
        .header-area h2 { font-family: 'Orbitron'; font-weight: 900; letter-spacing: -1px; font-size: 32px; }
        .header-area p { color: #888; font-weight: 600; font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 25px; }
        .input-label { display: block; font-size: 11px; font-weight: 800; color: #aaa; margin-bottom: 10px; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; padding: 18px 25px;
            background: #fff; border: 2px solid #f0f0f0;
            border-radius: 20px; font-family: 'Inter'; font-weight: 700;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-black); outline: none; background: #fff;
        }

        /* DOSYA YÜKLEME ALANI */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 120px;
            border: 2px dashed #ddd;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafafa;
        }

        .file-upload-wrapper:hover {
            border-color: var(--bli-red);
            background: rgba(255,51,51,0.02);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .file-info { text-align: center; color: #888; font-size: 13px; font-weight: 600; }
        .file-info i { font-size: 24px; color: var(--bli-red); margin-bottom: 10px; }
        
        #file-name-display {
            margin-top: 10px; font-size: 12px; color: var(--primary-black); font-weight: 800; display: none;
        }

        .submit-btn {
            width: 100%; padding: 24px;
            background: var(--primary-black); color: #fff;
            border-radius: 22px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 16px; cursor: pointer; transition: var(--transition);
            margin-top: 20px; border: none;
        }

        .submit-btn:hover {
            background: var(--bli-red); transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 51, 51, 0.2);
        }

        .back-nav {
            display: block; text-align: center; margin-top: 35px;
            color: #ccc; text-decoration: none; font-size: 13px; font-weight: 700;
            transition: 0.3s;
        }
        .back-nav:hover { color: var(--primary-black); }

        @media (max-width: 500px) {
            .bli-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <div class="bli-card">
        <div class="header-area">
            <img src="../logo1616.png" alt="BLI Logo">
            <h2>RECRUITMENT</h2>
            <p>ELİT EKİBE KATILMAK İÇİN FORMALARI DOLDUR</p>
        </div>

        <form id="formBli" action="https://formspree.io/f/mojnyoqb" method="POST" enctype="multipart/form-data">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label class="input-label">AD</label>
                    <input type="text" name="ad" placeholder="Ahmet" required>
                </div>
                <div class="input-group">
                    <label class="input-label">SOYAD</label>
                    <input type="text" name="soyad" placeholder="Yılmaz" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">GMAIL ADRESİ</label>
                <input type="email" name="email" placeholder="ornek@gmail.com" required>
            </div>

            <div class="input-group">
                <label class="input-label">BRANŞ</label>
                <select name="brans">
                    <option>VALORANT</option>
                    <option>CS2</option>
                    <option>LOL</option>
                    <option>PUBG MOBILE</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">DENEYİM & YETENEK (VİDEO LİNKİ EKLEYEBİLİRSİN)</label>
                <textarea name="deneyim" placeholder="Rankın, eski takımların ve varsa video linkin..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">YETENEK DOSYASI (OPSİYONEL)</label>
                <div class="file-upload-wrapper">
                    <input type="file" name="upload" id="fileInput" onchange="updateFileName()">
                    <div class="file-info">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Dosyayı buraya sürükle veya tıkla</p>
                    </div>
                </div>
                <p id="file-name-display"></p>
            </div>

            <button type="submit" class="submit-btn">BAŞVURUYU GÖNDER</button>

        </form>

        <a href="../index.html" class="back-nav">
            <i class="fa-solid fa-chevron-left"></i> Vazgeç ve Dön
        </a>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('file-name-display');
            if(input.files.length > 0) {
                display.innerText = "Seçilen Dosya: " + input.files[0].name;
                display.style.display = "block";
            }
        }

        document.getElementById('formBli').onsubmit = function() {
            const btn = document.querySelector('.submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GÖNDERİLİYOR...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.6';
        };
    </script>

</body>
</html>
