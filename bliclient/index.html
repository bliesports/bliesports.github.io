<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI CLIENT | Pro Management</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-black: #000000;
            --pure-white: #ffffff;
            --bli-krem: #F5F5DC; 
            --accent-red: #ff3333;
            --transition-smooth: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--pure-white);
            color: var(--primary-black);
            overflow-x: hidden;
        }

        /* Geri Dön Butonu */
        .back-home {
            position: absolute;
            top: 40px;
            left: 6%;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-black);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            transition: var(--transition-smooth);
            z-index: 100;
        }
        .back-home:hover {
            transform: translateX(-8px);
            color: var(--accent-red);
        }

        /* Hero Section */
        .client-hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--pure-white);
        }

        .hero-logo {
            width: 150px; 
            height: auto;
            margin-bottom: -10px;
            animation: logoFade 1.5s ease-out;
        }

        @keyframes logoFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .client-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: var(--bli-krem);
            letter-spacing: -3px;
            margin-bottom: 25px;
            text-transform: uppercase;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));
        }

        .btn-info-ghost {
            background: transparent;
            border: none;
            color: var(--primary-black);
            padding: 15px 40px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            letter-spacing: 2px;
        }

        .btn-info-ghost:hover {
            color: var(--bli-krem);
            transform: scale(1.1);
        }

        /* İndirme Alanı */
        .download-zone {
            padding: 120px 6%;
            background: #fafafa;
            text-align: center;
        }

        .section-tag {
            font-family: 'Orbitron';
            color: var(--accent-red);
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: block;
        }

        .download-main-title {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 60px;
            font-family: 'Orbitron';
        }

        .os-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .os-card {
            background: var(--pure-white);
            padding: 50px 40px;
            border-radius: 35px;
            width: 300px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            transition: var(--transition-smooth);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .os-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
        }

        .os-card i { font-size: 50px; margin-bottom: 25px; color: #333; }
        .os-card h3 { font-family: 'Orbitron'; font-size: 18px; margin-bottom: 10px; }
        .os-card p { color: #888; font-size: 13px; margin-bottom: 25px; line-height: 1.6; }

        .btn-download {
            color: var(--primary-black);
            text-decoration: none;
            font-weight: 900;
            font-size: 13px;
            border-bottom: 2px solid var(--primary-black);
            padding-bottom: 5px;
            transition: 0.3s;
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-download:hover {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }
    </style>
</head>
<body>

    <a href="https://bliesports.github.io/index.html" class="back-home">
        <i class="fa-solid fa-arrow-left-long"></i> GERİ DÖN
    </a>

    <section class="client-hero">
        <img src="../file_000000000eec720ab2516100c48b9aba.png" alt="BLI Logo" class="hero-logo">
        <h1 class="client-title">BLI CLIENT</h1>
        <a href="/bliclient/detayli-bilgi" class="btn-info-ghost">DETAYLI BİLGİ</a>
    </section>

    <section class="download-zone">
        <span class="section-tag">YAZILIM</span>
        <h2 class="download-main-title">ŞİMDİ İNDİR</h2>

        <div class="os-grid">
            <div class="os-card">
                <i class="fa-brands fa-windows"></i>
                <h3>WINDOWS</h3>
                <p>BLI Dashboard v1.0.4<br>Windows 10, 11 (64-bit)</p>
                <a href="../BLI.CLIENT_0.1.0_x64_en-US.msi" download="BLI.CLIENT_0.1.0_x64_en-US.msi" class="btn-download">WINDOWS İÇİN YÜKLE</a>
            </div>              
            
            <div class="os-card">
                <i class="fa-brands fa-apple"></i>
                <h3>MACOS</h3>
                <p>BLI Dashboard v1.0.4<br>macOS 12.0 veya üzeri</p>
                <a href="#" class="btn-download">MAC İÇİN YÜKLE</a>
            </div>

            <div class="os-card">
                <i class="fa-brands fa-linux"></i>
                <h3>LINUX</h3>
                <p>BLI Dashboard v1.0.4<br>.deb veya .rpm paketleri</p>
                <a href="#" class="btn-download">LINUX İÇİN YÜKLE</a>
            </div>
        </div>
    </section>

</body>
</html>
