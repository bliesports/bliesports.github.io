<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI REGISTER | Aramıza Katıl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bli-krem: #F5F5DC;
            --accent-gray: #1a1a1a;
            --input-focus: #252525;
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: white;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden; padding: 40px 0;
        }

        body::before {
            content: ''; position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .register-card {
            width: 100%; max-width: 480px; padding: 50px;
            background: #0d0d0d; border: 1px solid rgba(245, 245, 220, 0.05);
            text-align: center; box-shadow: 0 60px 120px rgba(0,0,0,0.9);
        }

        .reg-logo { width: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(245,245,220,0.15)); }
        
        h2 { 
            font-family: 'Orbitron'; font-size: 24px; margin-bottom: 35px; 
            color: var(--bli-krem); letter-spacing: 4px; font-weight: 900;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; font-family: 'Orbitron'; font-size: 10px; 
            color: #444; margin-bottom: 8px; letter-spacing: 2px; font-weight: 800;
        }

        input {
            width: 100%; padding: 15px; background: var(--accent-gray); border: 2px solid transparent;
            color: var(--bli-krem); border-radius: 4px; outline: none; transition: var(--transition);
            font-size: 14px; box-sizing: border-box;
        }
        input:focus { border-color: var(--bli-krem); background: var(--input-focus); }

        .btn-register {
            width: 100%; padding: 18px; background: var(--bli-krem); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%); transition: var(--transition);
            margin-top: 20px; font-size: 15px; letter-spacing: 2px;
        }
        .btn-register:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 0 20px rgba(245,245,220,0.2); }

        .login-text { margin-top: 30px; font-size: 13px; color: #444; }
        .login-text a {
            color: var(--bli-krem); text-decoration: none; font-weight: 800; margin-left: 5px;
            transition: 0.3s;
        }
        .login-text a:hover { color: white; text-decoration: underline; }

        #msg-box { 
            font-size: 11px; margin-top: 20px; display: none; 
            font-family: 'Orbitron'; padding: 12px; border-radius: 4px;
        }
        .error { color: #ff4444; background: rgba(255,0,0,0.1); }
        .success { color: #44ff44; background: rgba(0,255,0,0.1); }
    </style>
</head>
<body>

<div class="register-card">
    <img src="https://bliesports.github.io/File_000000000eec720ab2516100c48b9aba.png" class="reg-logo">
    <h2>KAYIT OL</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>ADINIZ</label>
            <input type="text" id="firstName" placeholder="Örn: Ali">
        </div>
        <div class="form-group">
            <label>SOYADINIZ</label>
            <input type="text" id="lastName" placeholder="Örn: Yılmaz">
        </div>
        <div class="form-group full-width">
            <label>E-POSTA ADRESİ</label>
            <input type="email" id="email" placeholder="isim@ornek.com">
        </div>
        <div class="form-group full-width">
            <label>ŞİFRE BELİRLE</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
    </div>

    <button class="btn-register" id="regBtn">HESABI OLUŞTUR</button>

    <div id="msg-box"></div>

    <div class="login-text">
        Zaten bir hesabın var mı? <a href="https://bliesports.github.io/login">GİRİŞ YAP</a>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = { 
        apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8", 
        authDomain: "bliesports.firebaseapp.com", 
        projectId: "bliesports", 
        storageBucket: "bliesports.firebasestorage.app", 
        messagingSenderId: "880767104142", 
        appId: "1:880767104142:web:5edbe111f42f16ab1545df" 
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const msgBox = document.getElementById('msg-box');

  document.getElementById('regBtn').onclick = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if(password.length < 6) {
        msgBox.style.display = 'block';
        msgBox.className = 'error';
        msgBox.innerText = "Şifre en az 6 karakter olmalıdır!";
        return;
    }

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
          msgBox.style.display = 'block';
          msgBox.className = 'success';
          msgBox.innerText = "Kayıt Başarılı! Yönlendiriliyorsunuz...";
          setTimeout(() => { window.location.href = "../login/index.html"; }, 2000);
      })
      .catch((error) => {
          msgBox.style.display = 'block';
          msgBox.className = 'error';
          msgBox.innerText = "Hata: " + error.message;
      });
  };
</script>

</body>
</html>
