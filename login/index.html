<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI LOGIN | Erişimi Doğrula</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bli-krem: #F5F5DC; /* İstediğin o asil krem */
            --accent-gray: #1a1a1a;
            --input-focus: #252525;
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: white;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }

        /* Arkaplan Hafif Parıltı */
        body::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .login-card {
            width: 100%; max-width: 450px; padding: 60px;
            background: #0d0d0d; border: 1px solid rgba(245, 245, 220, 0.05);
            text-align: center; box-shadow: 0 60px 120px rgba(0,0,0,0.9);
            position: relative;
        }

        .login-logo { width: 80px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(245,245,220,0.2)); }
        
        h2 { 
            font-family: 'Orbitron'; font-size: 26px; margin-bottom: 40px; 
            color: var(--bli-krem); letter-spacing: 5px; font-weight: 900;
        }

        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { 
            display: block; font-family: 'Orbitron'; font-size: 11px; 
            color: #444; margin-bottom: 10px; letter-spacing: 2px; font-weight: 800;
        }

        input {
            width: 100%; padding: 18px; background: var(--accent-gray); border: 2px solid transparent;
            color: var(--bli-krem); border-radius: 4px; outline: none; transition: var(--transition);
            font-size: 15px; font-weight: 500;
        }
        input:focus { border-color: var(--bli-krem); background: var(--input-focus); }

        /* KREM BUTON */
        .btn-primary {
            width: 100%; padding: 18px; background: var(--bli-krem); color: black;
            border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%); transition: var(--transition);
            margin-top: 15px; font-size: 15px; letter-spacing: 2px;
        }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 0 20px rgba(245,245,220,0.3); }

        .divider { margin: 40px 0; border-bottom: 1px solid #1a1a1a; position: relative; }
        .divider span { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            background: #0d0d0d; padding: 0 20px; color: #333; font-size: 12px; font-family: 'Orbitron'; 
        }

        .google-btn {
            width: 100%; padding: 15px; background: transparent; color: white; 
            border: 1px solid #222; display: flex; align-items: center; justify-content: center; 
            gap: 12px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: 0.3s;
            font-family: 'Inter'; font-size: 14px;
        }
        .google-btn:hover { background: #1a1a1a; border-color: var(--bli-krem); }

        .signup-text { margin-top: 35px; font-size: 14px; color: #444; }
        .signup-text a {
            color: var(--bli-krem); text-decoration: none; font-weight: 800; margin-left: 8px;
            transition: 0.3s; border-bottom: 1px solid transparent;
        }
        .signup-text a:hover { border-color: var(--bli-krem); }

        #error-message { 
            color: #ff4444; font-size: 12px; margin-top: 25px; display: none; 
            font-family: 'Orbitron'; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://bliesports.github.io/File_000000000eec720ab2516100c48b9aba.png" class="login-logo">
    <h2>GİRİŞ YAP</h2>

    <div class="form-group">
        <label>E-POSTA ADRESİ</label>
        <input type="email" id="email" autocomplete="off" placeholder="E-postanı yaz">
    </div>

    <div class="form-group">
        <label>ŞİFRE</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="loginBtn">OTURUMU BAŞLAT</button>

    <div class="divider"><span>SOSYAL ERİŞİM</span></div>

    <button class="google-btn" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google ile Devam Et
    </button>

    <div id="error-message">Hata: Kullanıcı yetkilendirilemedi.</div>

    <div class="signup-text">
        Üye değil misin? <a href="https://bliesports.github.io/register">KAYIT OL</a>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = { 
        apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8", 
        authDomain: "bliesports.firebaseapp.com", 
        projectId: "bliesports", 
        storageBucket: "bliesports.firebasestorage.app", 
        messagingSenderId: "880767104142", 
        appId: "1:880767104142:web:5edbe111f42f16ab1545df" 
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const errBox = document.getElementById('error-message');

  document.getElementById('loginBtn').onclick = () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    signInWithEmailAndPassword(auth, email, password)
      .then(() => window.location.href = "../index.html")
      .catch(() => {
          errBox.style.display = 'block';
          errBox.innerText = "Hata: Kimlik bilgileri geçersiz.";
      });
  };

  document.getElementById('googleBtn').onclick = async () => {
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        // Sadece daha önce kayıtlı olan kullanıcıyı içeri alıyoruz
        if (user.metadata.creationTime === user.metadata.lastSignInTime) {
            await user.delete(); 
            errBox.style.display = 'block';
            errBox.innerText = "Erişim Reddedildi: Kaydınız bulunmamaktadır.";
            await auth.signOut();
        } else {
            window.location.href = "../index.html";
        }
    } catch (error) { console.error(error); }
  };
</script>

</body>
</html>
