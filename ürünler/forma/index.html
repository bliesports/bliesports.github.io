<!DOCTYPE html><html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formalar & T-Shirtler | BLI Esports</title>
    <link rel="stylesheet" href="../../style.css"> 
    <style>
        body { background-color: #ffffff; color: #000; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); opacity: 0.8; }
        .img-holder { width: 100%; aspect-ratio: 1 / 1.25; background-color: #f6f6f6; border-radius: 8px; overflow: hidden; position: relative; margin-bottom: 12px; }
        .img-holder img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 2px; }
        .info h3 { font-size: 14px; margin: 0 0 5px 0; color: #333; font-weight: 600; }
        .info .price { font-size: 16px; font-weight: bold; color: #000; }
    </style>
</head>
<body><div class="container">
    <div class="page-title">FORMALAR & TSHIRTS</div><div class="product-grid">

    <a href="classic/index.html" class="product-card">
        <div class="img-holder">
            <div class="badge">ÖN SİPARİŞ</div>
            <img src="../../../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="BLI Classic Jersey">
        </div>
        <div class="info">
            <h3>BLI Esports 2026 Jersey "Classic"</h3>
            <div class="price">899,00 ₺</div>
        </div>
    </a>

    <a href="basic-oversize-tshirt/index.html" class="product-card">
        <div class="img-holder">
            <div class="badge">LIMITED EDITION</div>
            <img src="../../../tshırt1.jpg" alt="BLI Basic Oversize Tshirt">
        </div>
        <div class="info">
            <h3>BLI BASIC OVERSIZE TSHIRT (LIMITED EDITION)</h3>
            <div class="price">699,00 ₺</div>
        </div>
    </a>

</div>

</div></body>
</html>
