<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Jersey | BLI Esports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #ff00ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: #000; overflow-x: hidden; }

        .product-page { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; }

        /* GALERİ */
        .gallery-wrapper { width: 100%; position: relative; }
        .main-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .main-slider::-webkit-scrollbar { display: none; }
        .main-slider img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; background: #f9f9f9; }

        .dots { display: flex; justify-content: center; gap: 8px; padding: 15px 0; }
        .dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; }
        .dot.active { background: #000; width: 20px; border-radius: 10px; }

        /* DETAYLAR */
        .details { padding: 20px; }
        .brand-text { color: #888; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .p-title { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .p-price { font-size: 26px; font-weight: bold; color: var(--accent); margin-bottom: 25px; }

        /* BEDEN */
        .size-label { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 10px; }
        .size-list { display: flex; gap: 10px; margin-bottom: 30px; }
        .size-btn { width: 50px; height: 50px; border: 2px solid #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .size-btn.active { border-color: #000; background: #fcfcfc; }

        /* BUTONLAR */
        .btn-box { display: flex; flex-direction: column; gap: 12px; }
        .main-button { width: 100%; padding: 18px; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .pre-order { background: #000; color: #fff; border: none; } /* ÖN SİPARİŞ ANA BUTON */
        .fav-btn { background: none; border: 1px solid #eee; color: #666; font-size: 14px; }

        /* PC GÖRÜNÜMÜ */
        @media (min-width: 1024px) {
            .product-page { flex-direction: row; padding: 80px 50px; gap: 60px; }
            .gallery-wrapper { flex: 1; display: flex; flex-direction: row-reverse; gap: 20px; }
            .main-slider { flex-direction: column; overflow: visible; flex: 1; }
            .main-slider img { width: 100%; margin-bottom: 20px; border-radius: 15px; }
            .dots { display: none; }
            .details { flex: 0.7; position: sticky; top: 100px; height: fit-content; }
        }
    </style>
</head>
<body>

<div class="product-page">
    <div class="gallery-wrapper">
        <div class="main-slider" id="slider">
            <img src="1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="Ön">
            <img src="IMG_20260313_164559.png" alt="Arka">
        </div>
        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="details">
        <p class="brand-text">BLI PERFORMANCE</p>
        <h1 class="p-title">Classic Jersey</h1>
        <p class="p-price">899,00₺</p>

        <p class="size-label">BEDEN SEÇİMİ</p>
        <div class="size-list">
            <div class="size-btn" onclick="selSize(this, 'S')">S</div>
            <div class="size-btn" onclick="selSize(this, 'M')">M</div>
            <div class="size-btn active" onclick="selSize(this, 'L')">L</div>
            <div class="size-btn" onclick="selSize(this, 'XL')">XL</div>
        </div>

        <div class="btn-box">
            <button class="main-button pre-order" onclick="preOrder()">ÖN SİPARİŞ VER</button>
            <button class="main-button fav-btn"><i class="fa-regular fa-heart"></i> Favorilere Ekle</button>
        </div>

        <p style="margin-top: 30px; color: #666; font-size: 14px; line-height: 1.6;">
            BLI Esports resmi forması. Gelişmiş kumaş teknolojisi ile üstün performans için tasarlandı.
        </p>
    </div>
</div>

<script>
    let bdn = "L";

    function selSize(el, s) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        bdn = s;
    }

    function preOrder() {
        // Sepete ekle
        let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];
        sepet.push({
            id: 'classic-jersey-' + bdn,
            ad: 'Classic Jersey (' + bdn + ')',
            fiyat: 899,
            resim: 'ürünler/forma/classic/1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg'
        });
        localStorage.setItem('bli_sepet', JSON.stringify(sepet));
        
        // Bildirim ver ve ana sayfaya fırlat
        alert(bdn + " Beden Sepete Eklendi! Ana sayfaya yönlendiriliyorsun kral.");
        window.location.href = "../../../index.html"; 
    }

    const sld = document.getElementById('slider');
    const dts = document.querySelectorAll('.dot');
    sld.addEventListener('scroll', () => {
        let idx = Math.round(sld.scrollLeft / sld.offsetWidth);
        dts.forEach((d, i) => d.classList.toggle('active', i === idx));
    });
</script>

</body>
</html>
