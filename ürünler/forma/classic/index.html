<style>
  /* Beden Seçenekleri Stili */
  .size-selector {
    margin: 25px 0;
    text-align: left;
  }
  .size-title {
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
    color: #555;
  }
  .size-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .size-btn {
    width: 50px;
    height: 50px;
    border: 1px solid #ddd;
    background: #fff;
    color: #000;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .size-btn:hover {
    border-color: #000;
  }
  .size-btn.active {
    background: #000;
    color: #fff;
    border-color: #000;
  }
</style>

<div class="product-info">
    <h1 class="product-title">Classic Jersey</h1>
    <p class="product-price">899.00 TL</p>
    
    <div class="size-selector">
        <span class="size-title">Beden Seçin</span>
        <div class="size-options">
            <button class="size-btn" onclick="selectSize(this, 'S')">S</button>
            <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
            <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
            <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
            <button class="size-btn" onclick="selectSize(this, 'XXL')">XXL</button>
        </div>
    </div>

    <p style="color: #666; line-height: 1.6;">
      BLI Esports resmi forması. Yüksek performanslı nefes alabilen kumaş teknolojisi ile üretilmiştir.
    </p>
    <br>
    <button class="buy-btn" onclick="sepeteEkle()">SEPETE EKLE</button>
</div>

<script>
  let secilenBeden = "";

  function selectSize(element, size) {
    // Tüm butonlardan active class'ını sil
    const buttons = document.querySelectorAll('.size-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    
    // Tıklanan butona active class'ı ekle
    element.classList.add('active');
    secilenBeden = size;
  }

  function sepeteEkle() {
    if (secilenBeden === "") {
      alert("Kanka önce bir beden seçmen lazım!");
      return;
    }

    let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];
    const urun = {
      id: 'classic-jersey-' + secilenBeden,
      ad: 'Classic Jersey (' + secilenBeden + ')',
      fiyat: 899,
      resim: 'ürünler/forma/classic/b_Sağ_alttaki_gemini_f.jpeg',
      beden: secilenBeden
    };

    sepet.push(urun);
    localStorage.setItem('bli_sepet', JSON.stringify(sepet));
    
    // Sayfadaki sepet sayacını anında güncelle (Sayfa yenilemeden)
    const cartCount = document.getElementById('cart-count');
    if(cartCount) cartCount.innerText = sepet.length;

    alert(secilenBeden + ' beden forma sepete eklendi kral! 🚀');
  }
</script>
