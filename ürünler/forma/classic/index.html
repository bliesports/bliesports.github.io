<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Jersey | BLI Esports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #ff00ea; --bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #000; overflow-x: hidden; }

        /* Üst Header */
        .header { position: fixed; top: 0; width: 100%; height: 64px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid #eee; }
        .nav-logo { height: 35px; cursor: pointer; }

        /* Profesyonel Slider */
        .slider-container { width: 100%; margin-top: 64px; position: relative; overflow: hidden; }
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider::-webkit-scrollbar { display: none; }
        .slider img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; background: #f9f9f9; }

        .dots { display: flex; justify-content: center; gap: 8px; padding: 15px 0; }
        .dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #000; width: 20px; border-radius: 10px; }

        /* Ürün Detay */
        .content { padding: 20px; }
        .brand-label { color: #888; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        .product-title { font-size: 32px; font-weight: 800; margin: 5px 0; }
        .price { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 25px; }

        /* Beden Seçimi */
        .section-label { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 12px; text-transform: uppercase; }
        .size-grid { display: flex; gap: 10px; margin-bottom: 30px; }
        .size-item { width: 50px; height: 50px; border: 2px solid #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .size-item.active { border-color: #000; background: #fcfcfc; }

        /* Butonlar */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { width: 100%; padding: 18px; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        
        .add-btn { background: #000; color: #fff; font-size: 16px; }
        .remove-btn { background: #ff4d4d; color: #fff; font-size: 16px; display: none; } /* Başlangıçta gizli */
        .preorder-btn { background: #fff; color: #000; border: 2px solid #000; }
        
        .fav-link { background: none; color: #666; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<header class="header">
    <img src="../../../logo1616.png" class="nav-logo" onclick="location.href='../../../index.html'">
    <div style="position: relative;">
        <i class="fa-solid fa-cart-shopping" style="font-size: 20px;"></i>
        <span id="cart-indicator" style="position: absolute; top: -8px; right: -8px; background: red; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; display: none;">0</span>
    </div>
</header>

<div class="slider-container">
    <div class="slider" id="mainSlider">
        <img src="1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="Ön Görünüm">
        <img src="IMG_20260313_164559.png" alt="Arka Görünüm">
    </div>
    <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
    </div>
</div>

<div class="content">
    <p class="brand-label">BLI PERFORMANCE</p>
    <h1 class="product-title">Classic Jersey</h1>
    <p class="price">899,00₺</p>

    <p class="section-label">Beden Seçimi</p>
    <div class="size-grid">
        <div class="size-item" onclick="selectSize(this, 'S')">S</div>
        <div class="size-item" onclick="selectSize(this, 'M')">M</div>
        <div class="size-item active" onclick="selectSize(this, 'L')">L</div>
        <div class="size-item" onclick="selectSize(this, 'XL')">XL</div>
    </div>

    <div class="btn-group">
        <button id="addBtn" class="add-btn" onclick="cartAction('add')">SEPETE EKLE</button>
        <button id="removeBtn" class="remove-btn" onclick="cartAction('remove')">SEPETTEN SİL</button>
        <button class="preorder-btn">ÖN SİPARİŞ VER</button>
        <button class="fav-link"><i class="fa-regular fa-heart"></i> Favorilere Ekle</button>
    </div>

    <p style="margin-top: 30px; color: #666; font-size: 14px; line-height: 1.6;">
        BLI Esports resmi forması. Gelişmiş kumaş teknolojisi, hassas kesim ve dayanıklı baskı kalitesi ile üstün performans için tasarlandı.
    </p>
</div>

<script>
    let currentSize = "L";

    function selectSize(el, size) {
        document.querySelectorAll('.size-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        currentSize = size;
    }

    function cartAction(type) {
        const addBtn = document.getElementById('addBtn');
        const removeBtn = document.getElementById('removeBtn');
        const indicator = document.getElementById('cart-indicator');

        if(type === 'add') {
            addBtn.style.display = 'none';
            removeBtn.style.display = 'block';
            indicator.style.display = 'block';
            indicator.innerText = "1";
            alert(currentSize + " Beden Sepete Eklendi!");
        } else {
            addBtn.style.display = 'block';
            removeBtn.style.display = 'none';
            indicator.style.display = 'none';
            alert("Ürün sepetten çıkarıldı.");
        }
    }

    // Slider nokta takibi
    const slider = document.getElementById('mainSlider');
    const dots = document.querySelectorAll('.dot');
    slider.addEventListener('scroll', () => {
        let index = Math.round(slider.scrollLeft / slider.offsetWidth);
        dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    });
</script>

</body>
</html>
