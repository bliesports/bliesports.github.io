<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Jersey | BLI Esports</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    /* TEMEL AYARLAR */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; color: #000; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }

    /* NAVBAR */
    .navbar { 
        position: fixed; top: 0; width: 100%; height: 64px; 
        background: #fff; border-bottom: 1px solid #eee; 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 20px; z-index: 1000; 
    }

    /* ÜRÜN KONTEYNER */
    .product-container {
        max-width: 1100px;
        margin: 80px auto 0;
        display: flex;
        flex-direction: column;
        padding: 20px;
    }

    /* GALERİ (MOBİLDE YANA KAYDIRMALI) */
    .gallery {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        margin-bottom: 20px;
    }
    .gallery::-webkit-scrollbar { display: none; }
    
    .gallery img {
        width: 100%;
        flex-shrink: 0;
        scroll-snap-align: start;
        border-radius: 15px;
        border: 1px solid #eee;
        background: #f9f9f9;
    }

    /* BİLGİ ALANI */
    .product-details { padding: 10px; }
    .title { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
    .price { font-size: 20px; color: #444; margin-bottom: 20px; }

    /* BEDEN BUTONLARI */
    .size-box { margin-bottom: 25px; }
    .size-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; color: #888; }
    .sizes { display: flex; gap: 10px; }
    .size-btn {
        width: 45px; height: 45px; border: 1px solid #ddd; background: #fff;
        border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .size-btn.active { background: #000; color: #fff; border-color: #000; }

    /* SEPETE EKLE BUTONU */
    .add-to-cart {
        width: 100%; padding: 18px; background: #000; color: #fff;
        border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
        cursor: pointer; transition: 0.3s;
    }
    .add-to-cart:hover { transform: scale(0.98); background: #222; }

    /* PC GÖRÜNÜMÜ */
    @media (min-width: 768px) {
        .product-container { flex-direction: row; gap: 50px; align-items: flex-start; }
        .gallery { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: visible; }
        .product-details { flex: 0.8; position: sticky; top: 100px; }
    }
  </style>
</head>
<body>

<header class="navbar">
    <a href="../../../index.html"><img src="../../../logo1616.png" style="height: 40px;"></a>
    <div style="position: relative;">
        <i class="fa-solid fa-cart-shopping" style="font-size: 20px;"></i>
        <span id="cart-count" style="position:absolute; top:-10px; right:-10px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px;">0</span>
    </div>
</header>

<div class="product-container">
    <div class="gallery">
        <img src="b_Sağ_alttaki_gemini_f.jpeg" alt="Ön">
        <img src="IMG_20260313_164559.png" alt="Arka">
    </div>

    <div class="product-details">
        <h1 class="title">Classic Jersey</h1>
        <p class="price">899.00 TL</p>

        <div class="size-box">
            <span class="size-title">BEDEN SEÇİN</span>
            <div class="sizes">
                <button class="size-btn" onclick="setS(this, 'S')">S</button>
                <button class="size-btn" onclick="setS(this, 'M')">M</button>
                <button class="size-btn" onclick="setS(this, 'L')">L</button>
                <button class="size-btn" onclick="setS(this, 'XL')">XL</button>
            </div>
        </div>

        <p style="color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 30px;">
            BLI Esports resmi forması. Yüksek performanslı nefes alabilen kumaş teknolojisi ile üretilmiştir.
        </p>

        <button class="add-to-cart" onclick="addToCart()">SEPETE EKLE</button>
    </div>
</div>

<script>
    let selectedSize = "";

    function setS(btn, size) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSize = size;
    }

    function addToCart() {
        if(!selectedSize) { alert("Beden seçmedin kral!"); return; }
        alert(selectedSize + " beden sepete eklendi!");
        // Buraya sepet mantığını ekleyebilirsin
    }
</script>

</body>
</html>
