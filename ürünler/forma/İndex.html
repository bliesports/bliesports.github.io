<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI Classic Forma | BLI Esports</title>
    <link rel="stylesheet" href="../../stil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 50px 20px;
            gap: 60px;
            flex-wrap: wrap;
        }

        .product-image {
            flex: 1;
            max-width: 500px;
        }

        .product-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
        }

        .product-details {
            flex: 1;
            max-width: 500px;
        }

        .product-details h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .price {
            font-size: 2rem;
            color: #fff;
            font-weight: bold;
            margin: 20px 0;
        }

        .description {
            color: #888;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .size-selector {
            margin-bottom: 30px;
        }

        .size-selector select {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            outline: none;
        }

        .buy-btn {
            display: block;
            width: 100%;
            background: #fff;
            color: #000;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-btn:hover {
            background: #888;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="product-image">
            <img src="../../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="BLI Classic Forma">
        </div>

        <div class="product-details">
            <h1>Classic Forma</h1>
            <p class="description">
                BLI Esports 2026 Sezonu Resmi Oyuncu Forması. Profesyonel esporcular için tasarlanmış, nefes alan özel kumaş teknolojisi ve modern kesim.
            </p>
            
            <div class="size-selector">
                <label for="size">Beden Seçin:</label>
                <select id="size">
                    <option>S - Small</option>
                    <option>M - Medium</option>
                    <option>L - Large</option>
                    <option>XL - X-Large</option>
                </select>
            </div>

            <div class="price">799,00 TL</div>
            
            <a href="#" class="buy-btn">Sepete Ekle</a>
            
            <a href="../index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Mağazaya Geri Dön
            </a>
        </div>
    </div>

</body>
</html>
