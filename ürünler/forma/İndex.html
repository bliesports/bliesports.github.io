<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formalar | BLI Esports</title>
    <link rel="stylesheet" href="../../stil.css">
    <style>
        body { background-color: #ffffff; color: #000; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .page-title { margin-bottom: 30px; font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        /* BBL Tarzı Grid Yapısı */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobilde yan yana 2 tane */
            gap: 20px;
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); } /* Masaüstünde yan yana 4 tane */
        }

        .product-card {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .product-card:hover { opacity: 0.8; }

        .img-holder {
            width: 100%;
            aspect-ratio: 1 / 1.25; /* BBL'deki gibi hafif dikey dikdörtgen */
            background-color: #f6f6f6;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }

        .img-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #eee;
            color: #000;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 2px;
        }

        .info h3 { font-size: 14px; margin: 0 0 5px 0; color: #333; font-weight: 500; }
        .info .price { font-size: 16px; font-weight: bold; color: #d112bb; } /* Fiyat rengi */
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">FORMALAR</div>

    <div class="product-grid">

        <a href="classic.html" class="product-card">
            <div class="img-holder">
                <div class="badge">ÖN SİPARİŞ</div>
                <img src="../../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="Classic Jersey">
            </div>
            <div class="info">
                <h3>BLI Esports 2026 Jersey "Classic"</h3>
                <div class="price">799,00 ₺</div>
            </div>
        </a>

        <div class="product-card" style="opacity: 0.5;">
            <div class="img-holder">
                <div class="badge">YAKINDA</div>
                <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #ccc;">LOGO</div>
            </div>
            <div class="info">
                <h3>BLI Retro Jersey</h3>
                <div class="price">--- ₺</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
