<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI V1 PRO | Profesyonel Gaming Mouse</title>
    <link rel="icon" type="image/png" href="../../../logo1616.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #ffffff; color: #000; overflow-x: hidden; } /* Arka plan BEYAZ yapıldı */

        .product-page { display: flex; flex-wrap: wrap; padding: 20px; max-width: 1200px; margin: 60px auto; }

        /* Galeri Alanı */
        .gallery-container { display: flex; flex: 1.2; gap: 20px; }
        
        /* PC Yan Fotolar */
        .side-thumbnails { display: flex; flex-direction: column; gap: 10px; width: 80px; }
        .thumb { width: 100%; cursor: pointer; border-radius: 8px; background: #f9f9f9; padding: 5px; border: 1px solid #eee; transition: 0.3s; }
        .thumb:hover { border-color: #000; }

        /* Ana Ekran / Mobil Slider */
        .main-display { 
            flex: 1; 
            background: #f9f9f9; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            min-height: 500px; 
            overflow: hidden;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.4s ease-in-out;
            width: 100%;
            height: 100%;
        }

        .slider-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            flex-shrink: 0;
            padding: 40px;
        }

        /* Mobil Noktalar (Dots) */
        .dots-container {
            display: none; /* PC'de gizli */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active { background: #000; width: 20px; border-radius: 10px; }

        /* Ürün Bilgileri */
        .product-info { flex: 1; padding: 0 40px; min-width: 350px; }
        .brand-tag { color: #888; font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px;}
        .product-title { font-size: 36px; font-weight: 800; margin: 0 0 10px 0; color: #000; }
        .product-price { font-size: 28px; font-weight: bold; margin-bottom: 30px; color: #d112bb; } /* BBL Pembesi */

        /* Seçenekler */
        .option-label { font-weight: bold; margin-bottom: 15px; display: block; color: #000; font-size: 14px; text-transform: uppercase;}
        .color-options { display: flex; gap: 12px; margin-bottom: 40px; }
        .color-box { width: 50px; height: 50px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; padding: 5px; transition: 0.2s; background: #fff; }
        .color-box.active { border-color: #000; border-width: 2px; }
        .color-box img { width: 100%; height: 100%; object-fit: contain; }

        /* Butonlar */
        .add-to-cart { width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .add-to-cart:hover { background: #333; }
        
        .fav-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: 1px solid #ddd; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .fav-btn:hover { border-color: #000; }

        /* MOBİL AYARLAR */
        @media (max-width: 968px) {
            .product-page { flex-direction: column; margin: 0; padding: 10px; }
            .gallery-container { flex-direction: column; }
            .side-thumbnails { display: none; } /* Mobilde yan fotoları gizle */
            .dots-container { display: flex; } /* Mobilde noktaları göster */
            .main-display { min-height: 400px; border-radius: 0; margin: -10px -10px 20px -10px; }
            .product-info { padding: 20px 10px; }
        }
    </style>
</head>
<body>

<div class="product-page">
    <div class="gallery-container">
        <div class="side-thumbnails">
            <img src="../siyah.jpg" class="thumb" onclick="goToSlide(0)">
            <img src="../beyaz.png" class="thumb" onclick="goToSlide(1)">
            <img src="../turuncu.png" class="thumb" onclick="goToSlide(2)">
            <img src="../pembe.png" class="thumb" onclick="goToSlide(3)">
        </div>

        <div class="main-display" id="sliderContainer">
            <div class="slider-wrapper" id="sliderWrapper">
                <img src="../siyah.jpg" alt="V1 PRO Siyah">
                <img src="../beyaz.png" alt="V1 PRO Beyaz">
                <img src="../turuncu.png" alt="V1 PRO Turuncu">
                <img src="../pembe.png" alt="V1 PRO Pembe">
            </div>
            
            <div class="dots-container">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
                <div class="dot" onclick="goToSlide(2)"></div>
                <div class="dot" onclick="goToSlide(3)"></div>
            </div>
        </div>
    </div>

    <div class="product-info">
        <span class="brand-tag">BLI PERFORMANCE</span>
        <h1 class="product-title">BLI V1 PRO</h1>
        <div class="product-price">1.599,00₺</div>

        <span class="option-label">Renk Seçimi</span>
        <div class="color-options">
            <div class="color-box active" onclick="goToSlide(0)"><img src="../siyah.jpg"></div>
            <div class="color-box" onclick="goToSlide(1)"><img src="../beyaz.png"></div>
            <div class="color-box" onclick="goToSlide(2)"><img src="../turuncu.png"></div>
            <div class="color-box" onclick="goToSlide(3)"><img src="../pembe.png"></div>
        </div>

        <button class="add-to-cart" onclick="sepeteEkle('BLI V1 Pro', 1599)">SEPETE EKLE</button>
        <button class="fav-btn">Favorilere Ekle <i class="fa-regular fa-heart"></i></button>
        
        <p style="margin-top: 30px; line-height: 1.6; color: #555; font-size: 14px;">
            <b>Hız ve hassasiyetin yeni tanımı.</b> V1 Pro, profesyonel oyuncular için geliştirilmiş ultra hafif yapısı ve yüksek tarama hızıyla rakiplerinizin bir adım önünde olmanızı sağlar. Yeni nesil optik sensör ve 80 milyon tıklama ömrü.
        </p>
    </div>
</div>

<script>
    const wrapper = document.getElementById('sliderWrapper');
    const dots = document.querySelectorAll('.dot');
    const colorBoxes = document.querySelectorAll('.color-box');
    let currentSlide = 0;

    // SLIDER GİTME FONKSİYONU
    function goToSlide(index) {
        currentSlide = index;
        const offset = index * -100;
        wrapper.style.transform = `translateX(${offset}%)`;
        
        // Noktaları güncelle
        dots.forEach(dot => dot.classList.remove('active'));
        dots[index].classList.add('active');

        // Renk kutularını güncelle
        colorBoxes.forEach(box => box.classList.remove('active'));
        colorBoxes[index].classList.add('active');
    }

    // MOBİL İÇİN KAYDIRMA (SWIPE) DESTEĞİ
    let touchStartX = 0;
    let touchEndX = 0;

    const slider = document.getElementById('sliderContainer');
    slider.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    slider.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    });

    function handleSwipe() {
        if (touchStartX - touchEndX > 50) { if(currentSlide < 3) goToSlide(currentSlide + 1); }
        if (touchEndX - touchStartX > 50) { if(currentSlide > 0) goToSlide(currentSlide - 1); }
    }

// SEPETE EKLEME (TAM UYUMLU HALİ)
    function sepeteEkle(name, price) {
        // 1. Ana sayfanla aynı LocalStorage ismini kullanıyoruz
        let sepet = JSON.parse(localStorage.getItem('bli_user_cart')) || [];
        
        const renkler = ['Siyah', 'Beyaz', 'Turuncu', 'Pembe'];
        
        // ÖNEMLİ: Resim yolu ana sayfaya (index.html) göre olmalı. 
        // Eğer index.html ile aynı klasörde v1pro-banner.png varsa böyle kalsın.
        const resimYolu = "v1pro-banner.png"; 

        sepet.push({ 
            id: 101, 
            name: name, 
            price: price, 
            img: resimYolu, 
            renk: renkler[currentSlide] 
        });
        
        // 2. Veriyi kaydet
        localStorage.setItem('bli_user_cart', JSON.stringify(sepet));
        
        // 3. KRİTİK NOKTA: Diğer sekmeleri ve ana sayfayı tetikle
        window.dispatchEvent(new Event('storage'));
        
        // Görsel geri bildirim (Opsiyonel: alert yerine daha şık bir şey yapabilirsin)
        alert(name + " (" + renkler[currentSlide] + ") sepete eklendi!");
    }
</script>

</body>
</html>
