<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI V1 PRO | Galeri</title>
    <link rel="icon" type="image/png" href="../../../logo1616.png">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 60px 20px; }
        .swiper-container { width: 100%; max-width: 450px; margin: auto; overflow: hidden; border-radius: 20px; border: 1px solid #333; }
        .swiper-wrapper { display: flex; transition: transform 0.5s ease; }
        .swiper-slide { flex: 0 0 100%; }
        .swiper-slide img { width: 100%; display: block; }
        .colors { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .color-dot { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; }
        .active { border-color: #e60000; transform: scale(1.1); }
        .status-tag { background: #e60000; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLI V1 PRO</h1>

        <div class="swiper-container">
            <div class="swiper-wrapper" id="galeri">
                <div class="swiper-slide"><img src="../../../siyah.jpg" alt="Siyah"></div>
                <div class="swiper-slide"><img src="../../../beyaz.png" alt="Beyaz"></div>
                <div class="swiper-slide"><img src="../../../turuncu.png" alt="Turuncu"></div>
                <div class="swiper-slide"><img src="../../../pembe.png" alt="Pembe"></div>
            </div>
        </div>

        <div class="colors">
            <div class="color-dot" style="background: #111;" onclick="git(0)"></div>
            <div class="color-dot" style="background: #ffffff;" onclick="git(1)"></div>
            <div class="color-dot" style="background: #ff8000;" onclick="git(2)"></div>
            <div class="color-dot" style="background: #ff66cc;" onclick="git(3)"></div>
        </div>

        <div class="status-tag">YAKINDA SINIRLI STOKLARLA</div>
    </div>

    <script>
        function git(index) {
            const wrapper = document.getElementById('galeri');
            const genislik = document.querySelector('.swiper-container').offsetWidth;
            wrapper.style.transform = `translateX(${-index * genislik}px)`;
            
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(d => d.classList.remove('active'));
            dots[index].classList.add('active');
        }
        window.onload = () => git(0);
    </script>
</body>
</html>
