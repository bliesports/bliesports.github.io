<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI V1 PRO | Galeri</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden;}
        .container { padding: 80px 20px; }
        .swiper-container { width: 100%; max-width: 500px; margin: auto; overflow: hidden; position: relative; border-radius: 20px;}
        .swiper-wrapper { display: flex; transition: transform 0.4s ease-in-out; }
        .swiper-slide { flex: 0 0 100%; }
        .swiper-slide img { width: 90%; border-radius: 20px; border: 2px solid #333; }
        .colors { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.1); }
        .active { border-color: #e60000; transform: scale(1.1); }
        .status-tag { background: #e60000; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: inline-block; font-size: 1.1rem;}
    </style>
</head>
<body>
    <div class="container">
        <h1>BLI V1 PRO</h1>

        <div class="swiper-container">
            <div class="swiper-wrapper" id="galeri">
                <div class="swiper-slide"><img src="../../../siyah.jpg"></div>
                <div class="swiper-slide"><img src="../../../beyaz.jpg"></div>
                <div class="swiper-slide"><img src="../../../turuncu.jpg"></div>
                <div class="swiper-slide"><img src="../../../pembe.jpg"></div>
            </div>
        </div>

        <div class="colors">
            <div class="color-dot" style="background: #111;" onclick="git(0)"></div>
            <div class="color-dot" style="background: #eee;" onclick="git(1)"></div>
            <div class="color-dot" style="background: #ff6600;" onclick="git(2)"></div>
            <div class="color-dot" style="background: #ff66cc;" onclick="git(3)"></div>
        </div>

        <div class="status-tag">YAKINDA SINIRLI STOKLARLA</div>
    </div>

    <script>
        function git(index) {
            const wrapper = document.getElementById('galeri');
            const genislik = document.querySelector('.swiper-slide').clientWidth;
            wrapper.style.transform = `translateX(${-index * genislik}px)`;
            
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(d => d.classList.remove('active'));
            dots[index].classList.add('active');
        }
        // Sayfa açıldığında siyahı aktif et
        window.onload = () => git(0);
    </script>
</body>
</html>
