<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI V1 PRO | Profesyonel Gaming Mouse</title>
    <link rel="icon" type="image/png" href="../../../logo1616.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #fff; color: #111; overflow-x: hidden; }

        /* Ana Sayfa Düzeni */
        .product-page { display: flex; flex-wrap: wrap; padding: 20px; max-width: 1400px; margin: 80px auto; }

        /* Sol: Dikey Galeri (Nike Tarzı) */
        .gallery-container { display: flex; flex: 1.5; gap: 20px; }
        .side-thumbnails { display: flex; flex-direction: column; gap: 10px; width: 80px; }
        .thumb { width: 100%; cursor: pointer; border-radius: 8px; background: #f7f7f7; padding: 5px; }
        .thumb:hover { opacity: 0.7; }

        .main-display { flex: 1; background: #f7f7f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; min-height: 500px; }
        .main-display img { width: 90%; transition: 0.3s; }

        /* Sağ: Satın Alma Alanı */
        .product-info { flex: 1; padding: 0 40px; min-width: 350px; }
        .brand-tag { color: #e60000; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .product-title { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .product-price { font-size: 24px; font-weight: 600; margin-bottom: 30px; }

        /* Renk Seçimi */
        .option-label { font-weight: bold; margin-bottom: 15px; display: block; }
        .color-options { display: flex; gap: 15px; margin-bottom: 40px; }
        .color-box { width: 70px; height: 70px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .color-box.active { border-color: #111; }
        .color-box img { width: 100%; }

        /* Sepete Ekle Butonu (Nike Stili) */
        .add-to-cart { width: 100%; padding: 18px; background: #111; color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .add-to-cart:hover { background: #444; }

        /* Mobil Uyumluluk */
        @media (max-width: 968px) {
            .product-page { flex-direction: column; margin: 20px; }
            .gallery-container { flex-direction: column-reverse; }
            .side-thumbnails { flex-direction: row; width: 100%; overflow-x: auto; }
            .thumb { width: 70px; }
            .product-info { padding: 40px 0; }
        }
    </style>
</head>
<body>

<div class="product-page">
    <div class="gallery-container">
        <div class="side-thumbnails">
            <img src="../siyah.jpg" class="thumb" onclick="changeImage('../siyah.jpg')">
            <img src="../beyaz.png" class="thumb" onclick="changeImage('../beyaz.png')">
            <img src="../turuncu.png" class="thumb" onclick="changeImage('../turuncu.png')">
            <img src="../pembe.png" class="thumb" onclick="changeImage('../pembe.png')">
        </div>
        <div class="main-display">
            <img id="mainImg" src="../siyah.jpg" alt="V1 PRO">
        </div>
    </div>

    <div class="product-info">
        <span class="brand-tag">Yeni Üye Özel</span>
        <h1 class="product-title">BLI V1 PRO</h1>
        <p style="color: #666; margin-bottom: 10px;">Profesyonel E-Spor Mouse</p>
        <div class="product-price">1.599,00₺</div>

        <span class="option-label">Renk Seç</span>
        <div class="color-options">
            <div class="color-box active" onclick="changeImage('../siyah.jpg', this)"><img src="../siyah.jpg"></div>
            <div class="color-box" onclick="changeImage('../beyaz.png', this)"><img src="../beyaz.png"></div>
            <div class="color-box" onclick="changeImage('../turuncu.png', this)"><img src="../turuncu.png"></div>
            <div class="color-box" onclick="changeImage('../pembe.png', this)"><img src="../pembe.png"></div>
        </div>

      <button class="add-to-cart" onclick="sepeteEkle('V1 Pro Mouse', 1250)">Sepete Ekle</button>
        <button style="width: 100%; padding: 18px; background: #fff; border: 1px solid #ccc; border-radius: 50px; font-weight: bold; cursor: pointer;">Favorilere Ekle <i class="fa-regular fa-heart"></i></button>
        
        <p style="margin-top: 30px; line-height: 1.6; color: #444;">
            Hız ve hassasiyetin yeni tanımı. V1 Pro, profesyonel oyuncular için geliştirilmiş ultra hafif yapısı ve yüksek tarama hızıyla rakiplerinizin bir adım önünde olmanızı sağlar.
        </p>
    </div>
</div>

<script>
    function sepeteEkle(ad, fiyat) {
    // Mevcut sepeti al veya boş dizi oluştur
    let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];
    
    // Yeni ürünü listeye ekle
    sepet.push({ ad: ad, fiyat: fiyat });
    
    // Güncel sepeti kaydet
    localStorage.setItem('bli_sepet', JSON.stringify(sepet));
    
    // Kullanıcıya bilgi ver ve ana sayfaya yönlendir
    alert("Ürün başarıyla sepete eklendi! Ana sayfaya yönlendiriliyorsunuz.");
    window.location.href = "/index.html"; // Eğer GitHub Pages kullanıyorsan "/" yeterli olabilir
}
    function changeImage(src, element) {
        document.getElementById('mainImg').src = src;
        
        // Aktif renk kutusunu güncelle
        if(element) {
            document.querySelectorAll('.color-box').forEach(box => box.classList.remove('active'));
            element.classList.add('active');
        }
    }
</script>

</body>
</html>
