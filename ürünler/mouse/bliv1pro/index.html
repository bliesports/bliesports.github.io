<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI V1 PRO | Profesyonel Gaming Mouse</title>
    <link rel="icon" type="image/png" href="../../../logo1616.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; } /* Arka plan siyah yapıldı */

        .product-page { display: flex; flex-wrap: wrap; padding: 20px; max-width: 1400px; margin: 80px auto; }

        /* Galeri Alanı */
        .gallery-container { display: flex; flex: 1.5; gap: 20px; }
        .side-thumbnails { display: flex; flex-direction: column; gap: 10px; width: 80px; }
        .thumb { width: 100%; cursor: pointer; border-radius: 8px; background: #111; padding: 5px; border: 1px solid #333; }
        .thumb:hover { border-color: #fff; }

        .main-display { flex: 1; background: #111; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; min-height: 500px; border: 1px solid #333; }
        .main-display img { width: 80%; transition: 0.3s; }

        /* Ürün Bilgileri */
        .product-info { flex: 1; padding: 0 40px; min-width: 350px; }
        .brand-tag { color: #888; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; } /* Kırmızıdan Griye çekildi */
        .product-title { font-size: 36px; font-weight: 800; margin: 10px 0; color: #fff; }
        .product-price { font-size: 28px; font-weight: 600; margin-bottom: 30px; color: #fff; }

        /* Seçenekler */
        .option-label { font-weight: bold; margin-bottom: 15px; display: block; color: #888; }
        .color-options { display: flex; gap: 15px; margin-bottom: 40px; }
        .color-box { width: 60px; height: 60px; border: 2px solid #333; border-radius: 12px; cursor: pointer; padding: 5px; transition: 0.2s; background: #111; }
        .color-box.active { border-color: #fff; }
        .color-box img { width: 100%; object-fit: contain; }

        /* Butonlar */
        .add-to-cart { width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .add-to-cart:hover { background: #ccc; }
        
        .fav-btn { width: 100%; padding: 18px; background: transparent; color: #fff; border: 1px solid #333; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .fav-btn:hover { border-color: #fff; }

        @media (max-width: 968px) {
            .product-page { flex-direction: column; margin: 20px; }
            .gallery-container { flex-direction: column-reverse; }
            .side-thumbnails { flex-direction: row; width: 100%; overflow-x: auto; }
            .product-info { padding: 40px 0; }
        }
    </style>
</head>
<body>

<div class="product-page">
    <div class="gallery-container">
        <div class="side-thumbnails">
            <img src="../siyah.jpg" class="thumb" onclick="changeImage('../siyah.jpg')">
            <img src="../beyaz.png" class="thumb" onclick="changeImage('../beyaz.png')">
            <img src="../turuncu.png" class="thumb" onclick="changeImage('../turuncu.png')">
            <img src="../pembe.png" class="thumb" onclick="changeImage('../pembe.png')">
        </div>
        <div class="main-display">
            <img id="mainImg" src="../siyah.jpg" alt="V1 PRO">
        </div>
    </div>

    <div class="product-info">
        <span class="brand-tag">Yeni Üye Özel</span>
        <h1 class="product-title">BLI V1 PRO</h1>
        <p style="color: #888; margin-bottom: 10px;">Profesyonel E-Spor Mouse</p>
        <div class="product-price">1.599,00₺</div>

        <span class="option-label">Renk Seç</span>
        <div class="color-options">
            <div class="color-box active" onclick="changeImage('../siyah.jpg', this)"><img src="../siyah.jpg"></div>
            <div class="color-box" onclick="changeImage('../beyaz.png', this)"><img src="../beyaz.png"></div>
            <div class="color-box" onclick="changeImage('../turuncu.png', this)"><img src="../turuncu.png"></div>
            <div class="color-box" onclick="changeImage('../pembe.png', this)"><img src="../pembe.png"></div>
        </div>

        <button class="add-to-cart" onclick="sepeteEkle('BLI V1 Pro', 1599)">Sepete Ekle</button>
        <button class="fav-btn">Favorilere Ekle <i class="fa-regular fa-heart"></i></button>
        
        <p style="margin-top: 30px; line-height: 1.6; color: #888;">
            Hız ve hassasiyetin yeni tanımı. V1 Pro, profesyonel oyuncular için geliştirilmiş ultra hafif yapısı ve yüksek tarama hızıyla rakiplerinizin bir adım önünde olmanızı sağlar.
        </p>
    </div>
</div>

<script>
    function sepeteEkle(ad, fiyat) {
        let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];
        sepet.push({ ad: ad, fiyat: fiyat });
        localStorage.setItem('bli_sepet', JSON.stringify(sepet));
        
        alert("Ürün başarıyla sepete eklendi! Ana sayfaya yönlendiriliyorsunuz.");
        // GitHub Pages uyumlu yönlendirme (Hata payını sıfıra indirdik)
        window.location.href = "../../../index.html"; 
    }

    function changeImage(src, element) {
        document.getElementById('mainImg').src = src;
        if(element) {
            document.querySelectorAll('.color-box').forEach(box => box.classList.remove('active'));
            element.classList.add('active');
        }
    }
</script>

</body>
</html>
