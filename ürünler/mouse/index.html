<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI Ürünler | Mouse</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        body { background: #0f0f0f; color: white; text-align: center; padding-top: 100px; font-family: sans-serif;}
        .product-card { background: #1a1a1a; padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid #333; }
        .product-card img { width: 250px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid #444;}
        .product-card img:hover { transform: scale(1.05); border-color: #e60000; }
        .btn { display: block; margin-top: 15px; color: #e60000; text-decoration: none; font-weight: bold; font-size: 1.2rem;}
    </style>
</head>
<body>
    <h1>MOUSE SERİSİ</h1>
    <div class="product-card">
        <a href="bliv1pro/">
            <img src="../../siyah.jpg" alt="BLI V1 Pro">
            <span class="btn">BLI V1 Pro (Detayları Gör)</span>
        </a>
    </div>
</body>
</html>
