<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI Mouse Serisi | Amiral Gemisi</title>
    <link rel="icon" type="image/png" href="../../logo1616.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Premium Hero Alanı */
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); padding: 20px; }
        .hero h1 { font-size: 3.5rem; letter-spacing: 5px; margin-bottom: 10px; color: #fff; }
        .hero p { color: #888; font-size: 1.2rem; margin-bottom: 30px; }
        
        /* Vitrin Görseli */
        .showcase { position: relative; transition: 0.5s; cursor: pointer; }
        .showcase img { width: 100%; max-width: 450px; filter: drop-shadow(0 0 50px rgba(230, 0, 0, 0.2)); transition: 0.5s; }
        .showcase:hover img { transform: translateY(-20px) scale(1.05); filter: drop-shadow(0 0 70px rgba(230, 0, 0, 0.4)); }

        /* İnce Çizgi ve Detaylar */
        .divider { width: 100px; height: 3px; background: #e60000; margin: 20px auto; }
        
        /* Buton */
        .explore-btn { background: white; color: black; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .explore-btn:hover { background: #e60000; color: white; letter-spacing: 2px; }

        .back-nav { position: absolute; top: 30px; left: 30px; color: #555; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-nav">← ANA SAYFA</a>

    <section class="hero">
        <p>BLI ESPORTS PERFORMANS SERİSİ</p>
        <h1>V1 PRO</h1>
        <div class="divider"></div>
        
        <div class="showcase">
            <a href="bliv1pro/">
                <img src="../../siyah.jpg" alt="BLI V1 PRO Black Edition">
            </a>
        </div>

        <p style="margin-top: 40px; font-style: italic; color: #555;">Hız ve hassasiyetin mükemmel buluşması.</p>
        <a href="bliv1pro/" class="explore-btn">DETAYLARI KEŞFET</a>
    </section>

</body>
</html>
