<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mağaza | BLI Esports</title>
    <link rel="stylesheet" href="../stil.css">
    <style>
        body {
            background-color: #ffffff; /* Temiz bir görünüm için beyaz veya çok açık gri */
            color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        .product-card:hover {
            opacity: 0.8;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1.2; /* Hafif dikey dikdörtgen, mağaza havası verir */
            background-color: #f5f5f5;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pre-order-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #f1f1f1;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
        }

        .product-info h3 {
            font-size: 16px;
            margin: 0 0 5px 0;
            color: #333;
            font-weight: 500;
        }

        .product-info .price {
            font-size: 18px;
            font-weight: bold;
            color: #d112bb; /* BBL tarzı canlı bir renk veya siyah */
        }

        .status {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shop-grid">

        <a href="mouse/index.html" class="product-card">
            <div class="img-container">
                <img src="mouse/siyah.jpg" alt="V1 Pro Mouse">
            </div>
            <div class="product-info">
                <h3>BLI V1 Pro Gaming Mouse</h3>
                <div class="price">1.200,00 ₺</div>
                <div class="status">Ön Sipariş</div>
            </div>
        </a>

        <a href="formalar/classic.html" class="product-card">
            <div class="img-container">
                <img src="../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="Classic Forma">
                <div class="pre-order-badge">Ön Sipariş</div>
            </div>
            <div class="product-info">
                <h3>BLI Esports 2026 Jersey</h3>
                <div class="price">799,00 ₺</div>
                <div class="status">Koleksiyon</div>
            </div>
        </a>

    </div>
</div>

</body>
</html>
