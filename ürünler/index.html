<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mağaza | BLI Esports</title>
    <link rel="stylesheet" href="../stil.css">
    <style>
        body {
            background-color: #ffffff;
            color: #000;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .shop-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }

        /* Ürünlerin yan yana dizildiği ızgara */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobilde 2'li sıra, BBL gibi */
            gap: 20px;
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); } /* Masaüstünde 4'lü */
        }

        .product-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .image-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.2;
            background: #f4f4f4;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-item:hover img {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .product-name {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #d112bb; /* BBL'deki o pembe/mor tonu */
        }

        .pre-order-text {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="shop-container">
    <div class="product-grid">

        <a href="formalar/classic.html" class="product-item">
            <div class="image-box">
                <div class="badge">ÖN SİPARİŞ</div>
                <img src="../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="BLI Classic Jersey">
            </div>
            <div class="product-name">BLI Esports 2026 Jersey</div>
            <div class="product-price">799,00 ₺</div>
            <div class="pre-order-text">Ön Sipariş</div>
        </a>

        <a href="mouse/index.html" class="product-item">
            <div class="image-box">
                <img src="mouse/siyah.jpg" alt="V1 Pro Mouse">
            </div>
            <div class="product-name">BLI V1 Pro Gaming Mouse</div>
            <div class="product-price">1.200,00 ₺</div>
            <div class="pre-order-text">Stokta Var</div>
        </a>

        </div>
</div>

</body>
</html>
