<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mağaza | BLI Esports</title>
    <link rel="stylesheet" href="../stil.css"> <style>
        body { background-color: #ffffff; color: #000; font-family: 'Helvetica', sans-serif; margin: 0; }
        .category-header { text-align: center; padding: 60px 20px; }
        .category-header h1 { font-size: 40px; letter-spacing: 4px; text-transform: uppercase; }
        
        .category-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex-wrap: wrap;
        }

        .category-card {
            text-decoration: none;
            color: inherit;
            width: 400px;
            transition: 0.3s;
            text-align: center;
        }

        .category-card:hover { transform: translateY(-10px); }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f9f9f9;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper img {
            width: 80%; /* Kategoride ürünler biraz daha şık ve küçük dursun */
            object-fit: contain;
        }

        .category-card h2 { margin-top: 25px; font-size: 24px; letter-spacing: 2px; }
        .category-card span { color: #888; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>

    <div class="category-header">
        <h1>RESMİ MAĞAZA</h1>
        <p>BLI Esports Ekipman ve Tekstil Koleksiyonu</p>
    </div>

    <div class="category-grid">
        
        <a href="forma/index.html" class="category-card">
            <div class="image-wrapper">
                <img src="../1773409104630-019ce76b-03fd-7009-a7ae-4042ba85843a.jpeg" alt="Forma Koleksiyonu">
            </div>
            <h2>FORMALAR</h2>
            <span>Tüm Modelleri Gör</span>
        </a>

        <a href="mouse/index.html" class="category-card">
            <div class="image-wrapper">
                <img src="mouse/siyah.jpg" alt="Mouse Ekipmanları">
            </div>
            <h2>EKİPMANLAR</h2>
            <span>Mouse ve Dahası</span>
        </a>

    </div>

</body>
</html>
