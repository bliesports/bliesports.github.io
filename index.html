<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLI Esports | Official Store</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* SENİN ORİJİNAL STİLLERİN */
    body { background: #ffffff !important; color: #000000 !important; overflow-x: hidden; margin: 0; font-family: Arial, sans-serif; }
    
    .navbar { 
        position: fixed; top: 0; left: 0; width: 100%; height: 64px; 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 24px; background: #ffffff !important; 
        border-bottom: 1px solid #eee !important; z-index: 1000; 
    }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-icon { cursor: pointer; transition: 0.3s; color: #000000 !important; font-size: 20px; }
    
    .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
    .hamburger span { background: #000 !important; display: block; height: 3px; width: 25px; border-radius: 2px; transition: 0.3s; }

    .hero-container { 
        width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #eee; 
        transition: 0.4s; line-height: 0; background: #fff; position: relative;
    }
    .hero-container:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .hero-container img { width: 100%; height: auto; display: block; }
    
    .side-menu, .cart-sidebar { background: #ffffff !important; color: #000 !important; border-left: 1px solid #eee; transition: 0.3s; }
    .side-menu a { color: #000 !important; text-decoration: none; padding: 15px 20px; border-bottom: 1px solid #f5f5f5; display: block; }
    
    /* MODAL VE FORM TASARIMI */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:3000; align-items:center; justify-content:center; padding: 20px; }
    .modal-content { background:#fff; padding:25px; border-radius:15px; width:100%; max-width:380px; color:#000; position: relative; }
    .auth-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .auth-btn { width:100%; padding:12px; background:#000; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px; }
    .auth-link { color: #666; font-size: 13px; cursor: pointer; display: block; text-align: center; margin-top: 15px; }
  </style>
</head> 

<body>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle" style="margin-top:0;">Giriş Yap</h2>
    
    <div id="loginForm">
      <input type="email" id="loginEmail" class="auth-input" placeholder="E-posta">
      <input type="password" id="loginPass" class="auth-input" placeholder="Şifre">
      <button class="auth-btn" onclick="handleLogin()">Giriş Yap</button>
      <span class="auth-link" onclick="openModal('register')">Hesabın yok mu? Kayıt Ol</span>
    </div>

    <div id="registerForm" style="display:none;">
      <input type="text" id="regName" class="auth-input" placeholder="Kullanıcı Adı">
      <input type="email" id="regEmail" class="auth-input" placeholder="E-posta">
      <input type="password" id="regPass" class="auth-input" placeholder="Şifre">
      <input type="password" id="regPassConfirm" class="auth-input" placeholder="Şifre Tekrar">
      <button class="auth-btn" onclick="sendOTP()">Kayıt Ol (Onay Kodu Gönder)</button>
      <span class="auth-link" onclick="openModal('login')">Zaten üye misin? Giriş Yap</span>
    </div>

    <div id="otpForm" style="display:none;">
      <p style="font-size:14px;">Gmail adresine 6 haneli bir kod gönderdik.</p>
      <input type="text" id="otpInput" class="auth-input" placeholder="6 Haneli Kod" maxlength="6">
      <button class="auth-btn" onclick="verifyAndRegister()">Onayla ve Kayıt Ol</button>
    </div>

    <button onclick="closeModal()" style="background:none; border:none; position:absolute; top:15px; right:15px; cursor:pointer; font-size:20px;">&times;</button>
  </div>
</div>

<header class="navbar">
  <div class="nav-left">
    <img src="logo1616.png" alt="BLI Logo" style="height: 42px; cursor:pointer;" onclick="scrollToTop()"> 
  </div>
  <div class="nav-right">
    <div class="cart-wrapper" id="cartBtn" style="position:relative; cursor:pointer;">
      <i class="fa-solid fa-cart-shopping nav-icon"></i>
      <span id="cart-count" style="position:absolute; top:-10px; right:-10px; background:#000; color:#fff; border-radius:50%; padding:2px 6px; font-size:10px;">0</span>
    </div>
    <i class="fa-solid fa-magnifying-glass nav-icon"></i>
    <div class="hamburger" id="hamburger" onclick="toggleDropdown()">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<nav class="side-menu" id="sideMenu">
  <div id="authLinks">
    <a href="javascript:void(0)" onclick="menuAction('login')">Giriş Yap</a>
    <a href="javascript:void(0)" onclick="menuAction('register')">Kayıt Ol</a>
  </div>
  <div id="userLinks" style="display:none;">
    <span id="welcomeText" style="padding:15px 20px; display:block; font-weight:bold; border-bottom:1px solid #eee;">Selam Kral!</span>
    <a href="javascript:void(0)" onclick="logout()" style="color:red !important;">Çıkış Yap</a>
  </div>
  
  <a href="ürünler/">Ürünlerimiz</a>
  <a href="basvuru/index.html" id="nav-basvuru" style="font-weight: bold;">Başvuru Yap</a>
  <a href="javascript:void(0)" onclick="menuAction('support')">Destek</a>
</nav>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:15px; padding:15px;">
        <h3>SEPETİM</h3>
        <i class="fa-solid fa-xmark close-cart" id="closeCart" style="cursor:pointer; font-size:20px;"></i>
    </div>
    <div class="cart-content" style="padding:15px;"></div>
</div>

<main style="max-width: 900px; margin: 100px auto 0; padding: 0 20px 100px; text-align: center;">
  <a href="ürünler/mouse/bliv1pro/index.html" style="text-decoration:none; display:block; margin-bottom:40px;">
    <div class="hero-container"><img src="v1pro-banner.png" alt="V1 PRO"></div>
  </a>
  <a href="ürünler/forma/classic/index.html" style="text-decoration:none; display:block;">
    <div class="hero-container"><img src="b_Sağ_alttaki_gemini_f.jpeg" alt="Classic Jersey"></div>
  </a>
</main>

<footer class="footer" style="text-align:center; padding:40px 0; border-top:1px solid #eee;">
  <span style="font-weight: bold;">Sosyal medya hesaplarımız</span>
  <div class="socials" style="margin: 20px 0;">
    <a href="https://www.instagram.com/bliesportts/" target="_blank" style="margin:0 10px; font-size:24px; color:#000;"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://www.youtube.com/@BLIESPORTS" target="_blank" style="margin:0 10px; font-size:24px; color:#000;"><i class="fa-brands fa-youtube"></i></a>
  </div>
  <small>© 2026 BLI Esports</small>
</footer>

<script>
  // SENİN BİLGİLERİN
  const firebaseConfig = {
    apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8",
    authDomain: "bliesports.firebaseapp.com",
    projectId: "bliesports",
    storageBucket: "bliesports.firebasestorage.app",
    messagingSenderId: "880767104142",
    appId: "1:880767104142:web:5edbe111f42f16ab1545df",
    measurementId: "G-T1PHQ0Z45M"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  
  // EmailJS Init
  emailjs.init("QQAT1SNb9qOdZw353");

  const menuPanel = document.getElementById('sideMenu');
  const cartSidebar = document.getElementById('cartSidebar');
  let currentOTP = "";
  let tempUserData = {};

  // OTURUM KONTROLÜ (Profesyonel Giriş/Çıkış Takibi)
  auth.onAuthStateChanged(user => {
    const authLinks = document.getElementById('authLinks');
    const userLinks = document.getElementById('userLinks');
    const welcomeText = document.getElementById('welcomeText');

    if (user) {
      authLinks.style.display = 'none';
      userLinks.style.display = 'block';
      welcomeText.innerText = "Selam, " + (user.displayName || "Kral");
    } else {
      authLinks.style.display = 'block';
      userLinks.style.display = 'none';
    }
  });

  // GİRİŞ İŞLEMİ
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      alert("Giriş Başarılı! Hoş geldin kral.");
      closeModal();
    } catch (error) { alert("Hata: " + error.message); }
  }

  // OTP GÖNDERME (EmailJS)
  function sendOTP() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    const passConfirm = document.getElementById('regPassConfirm').value;

    if(!name || !email || !pass) return alert("Boş alan bırakma kral!");
    if(pass !== passConfirm) return alert("Şifreler uyuşmuyor!");

    currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
    tempUserData = { name, email, pass };

    const templateParams = {
      to_email: email,
      otp_code: currentOTP,
      name: "BLIESPORTS"
    };

    emailjs.send("service_4l87xyp", "template_4qf4r88", templateParams)
      .then(() => {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('otpForm').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Kodu Onayla";
      }, (err) => {
        alert("Mail gönderilemedi: " + JSON.stringify(err));
      });
  }

  // KOD DOĞRULAMA VE KAYIT
  async function verifyAndRegister() {
    const enteredOTP = document.getElementById('otpInput').value;
    if(enteredOTP !== currentOTP) return alert("Kod yanlış birader, tekrar bak!");

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(tempUserData.email, tempUserData.pass);
      await userCredential.user.updateProfile({ displayName: tempUserData.name });
      alert("Başarıyla üye oldun kral! BLIESPORTS'a hoş geldin.");
      closeModal();
    } catch (error) { alert("Hata: " + error.message); }
  }

  // STANDART FONKSİYONLARIN (BOZULMADI)
  function toggleDropdown(){
    menuPanel.classList.toggle('open');
    cartSidebar.classList.remove('open');
  }

  function menuAction(action){
    menuPanel.classList.remove('open');
    if(action==='login'||action==='register') openModal(action);
    else if(action==='support') alert('BLIESPORTS Destek: Bize Instagram üzerinden ulaşabilirsin kral.');
  }

  function openModal(type){ 
    document.getElementById('modal').style.display='flex'; 
    document.getElementById('modalTitle').innerText = type==='login' ? 'Giriş Yap' : 'Kayıt Ol';
    document.getElementById('loginForm').style.display = type==='login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = type==='register' ? 'block' : 'none';
    document.getElementById('otpForm').style.display = 'none';
  }

  function closeModal(){ document.getElementById('modal').style.display='none'; }
  
  function logout(){ 
    if(confirm("Çıkış yapmak istediğine emin misin?")) {
      auth.signOut().then(() => { location.reload(); }); 
    }
  }

  function scrollToTop(){ window.scrollTo({ top:0, behavior:'smooth' }); }

  // SEPET MANTIĞI (Senin Orijinal Kodun)
  let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];
  function sepetiGuncelle() {
    const cartCount = document.getElementById('cart-count');
    const cartContent = document.querySelector('.cart-content');
    if(cartCount) cartCount.innerText = sepet.length;
    if(!cartContent) return;
    if(sepet.length === 0) {
      cartContent.innerHTML = '<p style="color:#888; text-align:center; margin-top:20px;">Sepetiniz boş.</p>';
    } else {
      let html = '<div>';
      sepet.forEach(item => {
        html += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                  <img src="${item.resim}" style="width:40px;">
                  <div style="text-align:left;"><p style="font-size:12px; font-weight:bold; margin:0;">${item.ad}</p><p style="font-size:11px; margin:0;">${item.fiyat} TL</p></div>
                </div>`;
      });
      html += '<button onclick="sepetiBosalt()" style="width:100%; background:#000; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:5px;">TEMİZLE</button></div>';
      cartContent.innerHTML = html;
    }
    localStorage.setItem('bli_sepet', JSON.stringify(sepet));
  }
  function sepetiBosalt(){ if(confirm("Emin misin kral?")) { sepet=[]; sepetiGuncelle(); } }

  document.getElementById('cartBtn').addEventListener('click', () => {
    cartSidebar.classList.toggle('open');
    menuPanel.classList.remove('open');
  });
  document.getElementById('closeCart').addEventListener('click', () => cartSidebar.classList.remove('open'));

  window.onload = sepetiGuncelle;

  document.addEventListener('click', (e) => {
    if(!menuPanel.contains(e.target) && !document.getElementById('hamburger').contains(e.target)) menuPanel.classList.remove('open');
    if(!cartSidebar.contains(e.target) && !document.getElementById('cartBtn').contains(e.target)) cartSidebar.classList.remove('open');
  });
</script>

</body>
</html>
