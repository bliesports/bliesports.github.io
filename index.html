<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI Esports | Official Pro Store</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ----------------------------------------------------------------
           1. MOUSE İMLECİ (SADE & STABİL)
        ------------------------------------------------------------------- */
        * { cursor: none !important; }
        #custom-cursor {
            position: fixed; width: 8px; height: 8px; background: #000;
            border-radius: 50%; pointer-events: none; z-index: 10000;
        }
        #cursor-follower {
            position: fixed; width: 30px; height: 30px; border: 1px solid rgba(0,0,0,0.3);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease-out;
        }

        /* ----------------------------------------------------------------
           2. AÇILIŞ EKRANI (BEYAZ + SİYAH ÇUBUK)
        ------------------------------------------------------------------- */
        #loading-screen {
            position: fixed; inset: 0; background: #fff; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .progress-container { width: 250px; height: 2px; background: #eee; margin-top: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #000; transition: width 0.3s; }

        /* ----------------------------------------------------------------
           3. GENEL STİLLER
        ------------------------------------------------------------------- */
        :root { --red: #ff3333; --black: #000; --white: #fff; --gray: #f9f9f9; }
        body { font-family: 'Inter', sans-serif; background: #fff; overflow-x: hidden; }

        .navbar {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6%; z-index: 2000; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid #eee;
        }
        .nav-logo img { height: 50px; }

        .nav-tools { display: flex; gap: 15px; }
        .tool-icon {
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 18px;
            transition: 0.3s; position: relative;
        }
        .tool-icon:hover { background: var(--gray); color: var(--red); }
        .badge {
            position: absolute; top: 5px; right: 5px; background: var(--red);
            color: #fff; font-size: 10px; font-weight: 900; width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* ----------------------------------------------------------------
           4. PANELLER & MODALLAR
        ------------------------------------------------------------------- */
        .panel-dim { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; }
        .side-panel {
            position: fixed; top: 0; right: -100%; width: 450px; height: 100vh;
            background: #fff; z-index: 4000; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 50px; display: flex; flex-direction: column;
        }
        .side-panel.active { right: 0; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9000; display: none; align-items: center; justify-content: center;
        }
        .modal-card { background: #fff; width: 420px; border-radius: 35px; padding: 50px; position: relative; }

        .input-box {
            width: 100%; padding: 18px; border-radius: 12px; border: 2px solid transparent;
            background: var(--gray); margin-bottom: 15px; font-weight: 600;
        }
        .btn-main {
            width: 100%; padding: 20px; background: #000; color: #fff; border: none;
            border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; transition: 0.3s;
        }
        .btn-main:hover { background: var(--red); transform: translateY(-3px); }

        /* ----------------------------------------------------------------
           5. MAĞAZA İÇERİĞİ (MOUSE & FORMA)
        ------------------------------------------------------------------- */
        .content-wrap { margin-top: 130px; padding: 0 6% 80px; }
        
        .section-title {
            font-family: 'Orbitron'; font-size: 24px; font-weight: 900;
            margin-bottom: 30px; border-left: 5px solid var(--red); padding-left: 15px;
        }

        .product-banner {
            width: 100%; border-radius: 30px; overflow: hidden;
            background: #000; margin-bottom: 50px; position: relative;
        }
        .product-banner img { width: 100%; display: block; transition: 1.5s; }
        .product-banner:hover img { transform: scale(1.03); }

        /* ----------------------------------------------------------------
           6. SEPET SİSTEMİ
        ------------------------------------------------------------------- */
        #cart-items { flex: 1; overflow-y: auto; }
        .cart-row {
            display: flex; gap: 15px; padding: 15px; background: var(--gray);
            border-radius: 15px; margin-bottom: 10px; align-items: center;
        }
        .cart-row img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .cart-row-info { flex: 1; }
        .cart-row-info b { font-size: 14px; }
        .cart-row-info p { color: var(--red); font-weight: 800; font-size: 13px; }

        /* Footer */
        footer { background: #000; color: #fff; padding: 80px 6% 30px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .footer-col h4 { font-family: 'Orbitron'; color: var(--red); margin-bottom: 20px; font-size: 14px; }
        .footer-links li { list-style: none; margin-bottom: 12px; color: #555; transition: 0.3s; }
        .footer-links li:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="cursor-follower"></div>

    <div id="loading-screen">
        <img src="logo1616.png" height="50">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-logo" onclick="location.href='index.html'"><img src="logo1616.png"></div>
        <div class="nav-tools">
            <div class="tool-icon" onclick="openP('cart-panel')">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="badge" id="b-count">0</span>
            </div>
            <div class="tool-icon" onclick="openP('menu-panel')"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>
    </nav>

    <div class="panel-dim" id="dim" onclick="closeP()"></div>

    <aside class="side-panel" id="cart-panel">
        <h2 style="font-family:'Orbitron'; margin-bottom:30px;">SEPETİN</h2>
        <div id="cart-items"></div>
        <div style="margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <b>TOPLAM</b>
                <b id="cart-total" style="font-family:'Orbitron'; font-size:22px;">0.00 TL</b>
            </div>
            <button class="btn-main">ÖDEMEYE GEÇ</button>
        </div>
    </aside>

    <aside class="side-panel" id="menu-panel">
        <h2 style="font-family:'Orbitron'; margin-bottom:30px;">MENÜ</h2>
        <div id="user-area"></div>
        <ul class="footer-links" style="margin-top:30px;">
            <li onclick="location.href='index.html'">ANA SAYFA</li>
            <li onclick="location.href='https://bliesports.github.io/%C3%BCr%C3%BCnler/mouse/bliv1pro/'">BLI V1 PRO MOUSE</li>
            <li onclick="location.href='https://bliesports.github.io/%C3%BCr%C3%BCnler/forma/index.html'">FORMALAR</li>
        </ul>
    </aside>

    <div class="modal-overlay" id="auth-m">
        <div class="modal-card">
            <div id="log-view">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">GİRİŞ YAP</h2>
                <input type="email" id="l-mail" class="input-box" placeholder="E-Posta">
                <input type="password" id="l-pass" class="input-box" placeholder="Şifre">
                <button class="btn-main" onclick="handleLogin()">GİRİŞ</button>
                <p style="text-align:center; margin-top:20px; font-size:12px;">Yoksa? <b onclick="switchA('reg')">Kayıt Ol</b></p>
            </div>
            <div id="reg-view" style="display:none;">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">KAYIT OL</h2>
                <input type="text" id="r-name" class="input-box" placeholder="Ad Soyad">
                <input type="email" id="r-mail" class="input-box" placeholder="E-Posta">
                <input type="password" id="r-p1" class="input-box" placeholder="Şifre">
                <input type="password" id="r-p2" class="input-box" placeholder="Şifre Tekrar">
                <button class="btn-main" onclick="startOTP()">KOD GÖNDER</button>
            </div>
            <div id="otp-view" style="display:none;">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px;">DOĞRULA</h2>
                <input type="text" id="otp-in" class="input-box" placeholder="000000" style="text-align:center; letter-spacing:5px;">
                <button class="btn-main" onclick="finishReg()">TAMAMLA</button>
            </div>
        </div>
    </div>

    <main class="content-wrap">
        
        <h3 class="section-title">MOUSE</h3>
        <div class="product-banner" onclick="location.href='https://bliesports.github.io/%C3%BCr%C3%BCnler/mouse/bliv1pro/'">
            <img src="v1pro-banner.png">
        </div>

        <h3 class="section-title">FORMALAR VE T-SHIRTLER</h3>
        <div class="product-banner" onclick="location.href='https://bliesports.github.io/%C3%BCr%C3%BCnler/forma/index.html'">
            <img src="b_Sağ_alttaki_gemini_f.jpeg">
        </div>

    </main>

    <footer>
        <div class="footer-grid">
            <div class="footer-col">
                <img src="logo1616.png" height="40" style="filter:invert(1);">
                <p style="margin-top:15px; color:#444;">BLI Esports Professional Hardware.</p>
            </div>
            <div class="footer-col">
                <h4>HIZLI LİNKLER</h4>
                <ul class="footer-links">
                    <li>Hakkımızda</li>
                    <li>Sipariş Takibi</li>
                    <li>Destek</li>
                </ul>
            </div>
        </div>
        <p style="margin-top:50px; text-align:center; font-size:12px; color:#222;">&copy; 2026 BLI ESPORTS</p>
    </footer>

    <script>
        // --- CONFIG & FIREBASE ---
        const firebaseConfig = { apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8", authDomain: "bliesports.firebaseapp.com", projectId: "bliesports" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        emailjs.init("YOUR_PUBLIC_KEY");

        // --- MOUSE TRACKER (FIXED) ---
        const dot = document.getElementById('custom-cursor');
        const ring = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            ring.style.left = (e.clientX - 11) + 'px';
            ring.style.top = (e.clientY - 11) + 'px';
        });

        // --- LOADING SİSTEMİ ---
        window.onload = () => {
            let bar = document.getElementById('progress-bar');
            let w = 0;
            let iv = setInterval(() => {
                w += 10;
                bar.style.width = w + '%';
                if(w >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 400);
                }
            }, 100);
            renderCart();
        };

        // --- SEPET MOTORU ---
        let cart = JSON.parse(localStorage.getItem('bli_cart')) || [];
        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = "";
            let total = 0;
            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-row">
                        <img src="${item.img}">
                        <div class="cart-row-info"><b>${item.name}</b><p>${item.price} TL</p></div>
                        <i class="fa-solid fa-trash" onclick="removeI(${i})" style="color:#ddd; cursor:pointer;"></i>
                    </div>`;
            });
            document.getElementById('b-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total.toFixed(2) + " TL";
            localStorage.setItem('bli_cart', JSON.stringify(cart));
        }
        function removeI(i) { cart.splice(i,1); renderCart(); }

        // --- UI & AUTH ---
        function openP(id) { document.getElementById(id).classList.add('active'); document.getElementById('dim').style.display='block'; }
        function closeP() { document.querySelectorAll('.side-panel').forEach(p=>p.classList.remove('active')); document.getElementById('dim').style.display='none'; }
        function switchA(v) { 
            document.getElementById('log-view').style.display = v==='log'?'block':'none';
            document.getElementById('reg-view').style.display = v==='reg'?'block':'none';
        }

        let otp = null; let tUser = {};
        function startOTP() {
            const p1 = document.getElementById('r-p1').value;
            const p2 = document.getElementById('r-p2').value;
            if(p1 !== p2) return alert("Şifreler uymuyor!");
            otp = Math.floor(100000 + Math.random() * 900000);
            tUser = { n: document.getElementById('r-name').value, e: document.getElementById('r-mail').value, p: p1 };
            console.log("OTP:", otp);
            document.getElementById('reg-view').style.display='none';
            document.getElementById('otp-view').style.display='block';
        }

        async function finishReg() {
            if(document.getElementById('otp-in').value != otp) return alert("Kod yanlış!");
            try {
                const res = await auth.createUserWithEmailAndPassword(tUser.e, tUser.p);
                await res.user.updateProfile({ displayName: tUser.n });
                location.reload();
            } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            const area = document.getElementById('user-area');
            if(user) area.innerHTML = `<div style="padding:20px; background:#f4f4f4; border-radius:15px; text-align:center;"><b>${user.displayName}</b><br><button onclick="auth.signOut()" style="margin-top:10px; border:none; background:none; color:red; font-weight:800;">ÇIKIŞ</button></div>`;
            else area.innerHTML = `<button class="btn-main" onclick="document.getElementById('auth-m').style.display='flex'">GİRİŞ YAP</button>`;
        });
    </script>
</body>
</html>
