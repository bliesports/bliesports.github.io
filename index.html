<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI Esports | Official Pro Store</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@100;300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. PREMIUM DESIGN SYSTEM & VARIABLES
           ============================================================ */
        :root {
            --primary-black: #000000;
            --pure-white: #ffffff;
            --accent-red: #ff3333;
            --accent-red-hover: #cc0000;
            --bg-light-gray: #f8f8f8;
            --border-subtle: rgba(0,0,0,0.06);
            --transition-smooth: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            --card-radius: 30px;
            --nav-height: 90px;
            --nav-height-scrolled: 75px;
        }

        /* ============================================================
           2. GLOBAL RESETS
           ============================================================ */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter', sans-serif; background:var(--pure-white); color:var(--primary-black); overflow-x:hidden; scroll-behavior:smooth; }
        a { text-decoration:none; color:inherit; }
        ul { list-style:none; }
        button { border:none; background:none; cursor:pointer; font-family:inherit; }

        /* ============================================================
           3. NAVIGATION (STABILIZED HAMBURGER)
           ============================================================ */
        .navbar { position:fixed; top:0; left:0; width:100%; height:var(--nav-height); background:rgba(255,255,255,0.85); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0 6%; transition:var(--transition-smooth); border-bottom:1px solid var(--border-subtle); }
        .navbar.scrolled { height:var(--nav-height-scrolled); background:rgba(255,255,255,0.98); box-shadow:0 10px 30px rgba(0,0,0,0.04); }
        .nav-logo img { height:52px; width:auto; transition:var(--transition-smooth); cursor:pointer; }
        .navbar.scrolled .nav-logo img { height:42px; }
        .nav-tools { display:flex; align-items:center; gap:8px; }
        .tool-btn { width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; transition:var(--transition-smooth); position:relative; }
        .tool-btn:hover { background:var(--bg-light-gray); color:var(--accent-red); }
        .hamburger { width:55px; height:55px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; cursor:pointer; position:relative; }
        .hamburger::after { content:''; position:absolute; inset:-5px; }
        .hamburger span { width:28px; height:3px; background:var(--primary-black); border-radius:10px; transition:var(--transition-smooth); }
        .cart-badge { position:absolute; top:12px; right:12px; background:var(--accent-red); color:#fff; font-size:10px; font-weight:900; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #fff; }

        /* ============================================================
           4. SEARCH SYSTEM
           ============================================================ */
        .search-portal { position:fixed; top:-100%; left:0; width:100%; height:100vh; background:var(--pure-white); z-index:2500; display:flex; flex-direction:column; padding:120px 10%; transition:var(--transition-smooth); opacity:0; }
        .search-portal.active { top:0; opacity:1; }
        .search-close-top { position:absolute; top:40px; right:6%; font-size:40px; color:var(--primary-black); cursor:pointer; transition:0.3s; }
        .search-close-top:hover { color:var(--accent-red); transform:rotate(90deg); }
        .search-field-wrapper { display:flex; align-items:center; gap:30px; border-bottom:4px solid var(--primary-black); padding-bottom:20px; }
        .search-field-wrapper input { flex:1; border:none; outline:none; background:none; font-family:'Orbitron'; font-size:45px; font-weight:900; text-transform:uppercase; letter-spacing:-1px; }
        .search-results-box { margin-top:50px; display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:25px; overflow-y:auto; }
        .s-card { display:flex; align-items:center; gap:20px; padding:20px; background:var(--bg-light-gray); border-radius:20px; cursor:pointer; transition:0.3s; }
        .s-card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(0,0,0,0.05); }
        .s-card img { width:90px; aspect-ratio:16/9; object-fit:cover; border-radius:12px; }
        .s-card h4 { font-family:'Orbitron'; font-size:16px; }

        /* ============================================================
           5. BANNER ENGINE
           ============================================================ */
        .content-engine { margin-top:120px; padding:0 5% 100px; animation:fadeIn 1s ease-out; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .banner-stack { display:grid; grid-template-columns:1fr; gap:35px; }
        .pro-banner { width:100%; aspect-ratio:16/9; border-radius:var(--card-radius); overflow:hidden; background:#000; position:relative; cursor:pointer; box-shadow:0 25px 60px rgba(0,0,0,0.1); }
        .pro-banner img { width:100%; height:100%; object-fit:cover; transition:transform 2s cubic-bezier(0.19,1,0.22,1); }
        .pro-banner:hover img { transform:scale(1.06); }

        /* ============================================================
           6. SIDE PANELS
           ============================================================ */
        .global-dimmer { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(12px); z-index:1900; display:none; opacity:0; transition:0.5s; }
        .panel { position:fixed; top:0; right:-100%; width:450px; height:100vh; background:var(--pure-white); z-index:2000; transition:var(--transition-smooth); display:flex; flex-direction:column; padding:60px 45px; box-shadow:-20px 0 60px rgba(0,0,0,0.1); }
        @media (max-width:480px){.panel{width:100%;}}
        .panel.active{right:0;}
        .panel-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:50px;}
        .panel-header h2{font-family:'Orbitron'; font-weight:900; letter-spacing:-1px;}
        .menu-list{flex:1;}
        .menu-item{margin-bottom:15px;}
        .menu-link{display:flex; align-items:center; gap:20px; padding:24px 30px; border-radius:20px; background:var(--bg-light-gray); font-weight:800; font-size:20px; transition:0.3s;}
        .menu-link:hover{ background:var(--primary-black); color:var(--pure-white); transform:translateX(10px);}
        .menu-link i{color:var(--accent-red); width:25px;}
        .cart-flow{flex:1; overflow-y:auto;}
        .cart-item{display:flex; gap:20px; padding:20px; background:var(--bg-light-gray); border-radius:20px; margin-bottom:15px; position:relative;}
        .cart-item img{width:90px; aspect-ratio:16/9; object-fit:cover; border-radius:12px;}
        .btn-premium{width:100%; padding:24px; background:var(--primary-black); color:var(--pure-white); border-radius:20px; font-weight:900; font-family:'Orbitron'; font-size:17px; transition:0.4s; margin-bottom:10px; border:2px solid transparent;}
        .btn-premium:hover{background:var(--accent-red); transform:translateY(-3px);}
        .btn-outline{width:100%; padding:24px; background:transparent; color:var(--primary-black); border:2px solid var(--primary-black); border-radius:20px; font-weight:900; font-family:'Orbitron'; transition:0.3s;}
        .btn-outline:hover{background:var(--primary-black); color:#fff;}

        /* ============================================================
           7. FOOTER TERMINAL
           ============================================================ */
        .footer-terminal{background:#050505; color:var(--pure-white); padding:100px 6% 40px;}
        .footer-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:60px; max-width:1400px; margin:0 auto;}
        .footer-col h4{font-family:'Orbitron'; color:var(--accent-red); font-size:14px; margin-bottom:30px; letter-spacing:2px;}
        .footer-list li{margin-bottom:15px;}
        .footer-list a{color:#555; font-size:15px; transition:0.3s;}
        .footer-list a:hover{color:#fff; padding-left:5px;}
        .legal-box{margin-top:100px; padding-top:40px; border-top:1px solid #111; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#222;}

        /* ============================================================
           8. MODALS & UI COMPONENTS
           ============================================================ */
        .bli-modal{position:fixed; inset:0; z-index:5000; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); padding:20px;}
        .bli-modal.active{display:flex;}
        .modal-card{background:var(--pure-white); width:100%; max-width:460px; border-radius:40px; padding:50px; position:relative; box-shadow:0 50px 100px rgba(0,0,0,0.5);}
        .form-group{margin-bottom:25px;}
        .form-group label{display:block; font-size:11px; font-weight:900; margin-bottom:10px; color:#aaa;}
        .form-input{width:100%; padding:20px; border-radius:18px; background:var(--bg-light-gray); border:2px solid transparent; font-family:'Inter'; font-weight:700; transition:0.3s;}
        .form-input:focus{border-color:var(--primary-black); background:#fff;}
        #toast-master{position:fixed; bottom:40px; right:40px; z-index:9999;}
        .toast-msg{background:var(--primary-black); color:var(--pure-white); padding:22px 35px; border-radius:20px; margin-top:15px; font-weight:800; display:flex; align-items:center; gap:15px; box-shadow:0 20px 50px rgba(0,0,0,0.3); animation:toastIn 0.5s cubic-bezier(0.17,0.88,0.32,1.27);}
        @keyframes toastIn{from{transform:translateX(100%);} to{transform:translateX(0);}}
    </style>
</head>
<body>

    <!-- LOADER, SEARCH, NAV, PANELS, MAIN, FOOTER aynı şekilde geldi, hiç değiştirilmedi -->

    <div id="loader-overlay" style="position:fixed; inset:0; background:#fff; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <img src="logo1616.png" style="height:65px; margin-bottom:25px;">
        <div style="width:150px; height:3px; background:#f0f0f0; border-radius:10px; overflow:hidden;">
            <div id="load-progress-bar" style="width:0%; height:100%; background:#000; transition:0.3s;"></div>
        </div>
    </div>

    <!-- NAVBAR, SEARCH PORTAL, SIDE PANELS, MAIN CONTENT, FOOTER aynen geldi -->

    <div class="search-portal" id="searchPortal">
        <div class="search-close-top" onclick="toggleSearchPortal()">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <div class="search-field-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="font-size:30px;"></i>
            <input type="text" id="masterSearchInput" placeholder="ARA..." oninput="executeLiveSearch()">
        </div>
        <div id="searchResultsDisplay" class="search-results-box"></div>
    </div>

    <nav class="navbar" id="mainNavbar">
        <div class="nav-logo" onclick="location.href='index.html'">
            <img src="logo1616.png" alt="BLI ESPORTS">
        </div>

        <div class="nav-tools">
            <button class="tool-btn" onclick="toggleSearchPortal()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="tool-btn" onclick="openSidePanel('cartPanel')">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cartBadgeCount">0</span>
            </button>
            <div class="hamburger" id="hamburgerTrigger" onclick="openSidePanel('menuPanel')">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="global-dimmer" id="globalDimmer" onclick="closeAllSidePanels()"></div>

    <aside class="panel" id="menuPanel">
        <div class="panel-header">
            <h2>GEZİNTİ</h2>
            <button class="tool-btn" onclick="closeAllSidePanels()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="menu-list">
            <div class="menu-item"><a href="index.html" class="menu-link"><i class="fa-solid fa-house"></i> ANA SAYFA</a></div>
            <div class="menu-item"><a href="/ürünler/index.html" class="menu-link"><i class="fa-solid fa-shop"></i> TÜM ÜRÜNLER</a></div>
            <div class="menu-item"><a href="/basvuru/index.html" class="menu-link"><i class="fa-solid fa-user-plus"></i> EKİBE KATIL</a></div>
        </div>
        <div id="authPanelContainer"></div>
    </aside>

    <aside class="panel" id="cartPanel">
        <div class="panel-header">
            <h2>SEPETİN</h2>
            <button class="tool-btn" onclick="closeAllSidePanels()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-flow" id="cartItemsContainer"></div>
        <div style="margin-top:auto; padding-top:30px; border-top:1px dashed #ddd;">
            <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
                <span style="color:#aaa; font-weight:600;">TOPLAM</span>
                <span id="grandTotalDisplay" style="font-family:'Orbitron'; font-size:26px; font-weight:900;">0.00 TL</span>
            </div>
            <button class="btn-premium" onclick="initCheckout()">ÖDEME ADIMINA GEÇ</button>
        </div>
    </aside>

    <main class="content-engine">
        <div class="banner-stack">
            <div class="pro-banner" onclick="location.href='/ürünler/mouse/bliv1pro/index.html'">
                <img src="v1pro-banner.png" alt="BLI V1 PRO MOUSE">
            </div>
            <div class="pro-banner" onclick="location.href='/ürünler/forma/classic/index.html'">
                <img src="b_Sağ_alttaki_gemini_f.jpeg" alt="BLI ELITE JERSEY">
            </div>
        </div>
    </main>

    <div id="toast-master"></div>

    <script>
        // ============================
        // GLOBAL HELPER FUNCTIONS
        // ============================
        function $(id){return document.getElementById(id);}
        function toggleSearchPortal(){ $('searchPortal').classList.toggle('active'); }

        // ============================
        // SIDE PANEL LOGIC
        // ============================
        function openSidePanel(panelId){
            closeAllSidePanels();
            $('globalDimmer').style.display = 'block';
            $(panelId).classList.add('active');
        }
        function closeAllSidePanels(){
            $('globalDimmer').style.display = 'none';
            document.querySelectorAll('.panel.active').forEach(p=>p.classList.remove('active'));
        }

        // ============================
        // SEARCH FUNCTION
        // ============================
        const products = [
            {name:'BLI V1 PRO MOUSE', img:'v1pro-banner.png', link:'/ürünler/mouse/bliv1pro/index.html'},
            {name:'BLI ELITE JERSEY', img:'b_Sağ_alttaki_gemini_f.jpeg', link:'/ürünler/forma/classic/index.html'}
        ];
        function executeLiveSearch(){
            const query = $('masterSearchInput').value.toLowerCase();
            const container = $('searchResultsDisplay');
            container.innerHTML='';
            if(query.length<2) return;
            products.filter(p=>p.name.toLowerCase().includes(query))
                .forEach(p=>{
                    const card=document.createElement('div'); card.className='s-card';
                    card.onclick=()=>location.href=p.link;
                    card.innerHTML=`<img src="${p.img}"><h4>${p.name}</h4>`;
                    container.appendChild(card);
                });
        }

        // ============================
        // CART SYSTEM
        // ============================
        let cartItems = [];
        function updateCartUI(){
            const container = $('cartItemsContainer');
            container.innerHTML='';
            let total=0;
            cartItems.forEach((item,i)=>{
                total+=item.price*item.qty;
                const el = document.createElement('div'); el.className='cart-item';
                el.innerHTML=`
                    <img src="${item.img}">
                    <div style="flex:1;">
                        <h4 style="font-family:'Orbitron'; font-weight:900;">${item.name}</h4>
                        <span>Adet: ${item.qty}</span>
                        <span style="margin-left:10px;">Fiyat: ${item.price} TL</span>
                    </div>
                    <button onclick="removeFromCart(${i})" style="position:absolute; top:10px; right:10px;"><i class="fa-solid fa-xmark"></i></button>
                `;
                container.appendChild(el);
            });
            $('grandTotalDisplay').textContent=total.toFixed(2)+' TL';
            $('cartBadgeCount').textContent=cartItems.length;
        }
        function addToCart(item){ 
            const exists = cartItems.find(i=>i.name===item.name);
            if(exists) exists.qty+=1; else cartItems.push({...item,qty:1});
            updateCartUI();
        }
        function removeFromCart(index){ cartItems.splice(index,1); updateCartUI(); }
        function initCheckout(){ alert('Ödeme adımı yakında aktif olacak!'); }

        // ============================
        // LOADER ANIMATION
        // ============================
        window.addEventListener('load',()=>{
            let progress=0;
            const bar=$('load-progress-bar');
            const interval = setInterval(()=>{
                progress+=1;
                bar.style.width=progress+'%';
                if(progress>=100) clearInterval(interval);
            },10);
            setTimeout(()=>{$('loader-overlay').style.display='none';},1100);
        });

        // ============================
        // SCROLL NAVBAR SHRINK
        // ============================
        window.addEventListener('scroll',()=>{
            if(window.scrollY>50) $('mainNavbar').classList.add('scrolled');
            else $('mainNavbar').classList.remove('scrolled');
        });
    </script>
</body>
</html>
