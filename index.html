</nav>

<div class="cart-sidebar" id="cartSidebar" style="background: #000000; color: #ffffff; border-left: 1px solid #333;">

        <h3>SEPETİM</h3>

    </div>
</div>

<main style="max-width: 800px; margin: 80px auto 20px; padding: 0 20px; text-align: center; position: relative; z-index: 10;">
  <a href="https://bliesports.github.io/ürünler/mouse/bliv1pro/" style="text-decoration: none; display: block; margin-bottom: 20px;">
    <div style="width: 100%; aspect-ratio: 16 / 9; border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.3s;" onmouseover="this.style.transform='scale(1.02)';" onmouseout="this.style.transform='scale(1)';" >
      <img src="v1pro-banner.png" alt="V1 PRO Serisi" style="width: 100%; height: 100%; object-fit: cover; display: block;">
    </div>
  </a>
  <a href="detayli-bilgi/index.html" class="btn" style="display: inline-block; padding: 12px 30px; background: #ffffff; color: #000000; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s;" onmouseover="this.style.background='#888888';" onmouseout="this.style.background='#ffffff';">DETAYLI BİLGİ</a>
</main>

<footer class="footer" style="background: #000000; color: #ffffff; border-top: 1px solid #333;">

    <a href="https://www.youtube.com/@BLIESPORTS" target="_blank" style="color: #ffffff;"><i class="fa-brands fa-youtube"></i></a>
  </div>

  <section style="display:none;">
    <h2>BLI Esports Markası Hakkında</h2>
    <p>BLI Esports, oyuncular için V1 Pro serisi gibi yüksek performanslı mouselar ve ekipmanlar üretir.</p>
  </section>
</footer>

<script>
  // SEPET SİSTEMİ
  let sepet = JSON.parse(localStorage.getItem('bli_sepet')) || [];

  function sepetiGuncelle() {
      const cartCount = document.getElementById('cart-count');
      const cartContent = document.querySelector('.cart-content');
      if (!cartCount || !cartContent) return;

      cartCount.innerText = sepet.length;

      if (sepet.length === 0) {
          cartContent.innerHTML = '<p style="color:#888888; text-align:center; margin-top:20px;">Sepetiniz şu an boş.</p>';
      } else {
          let html = '<ul style="list-style:none; padding:10px; color:white;">';
          sepet.forEach((item) => {
              html += `<li style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">
                          <span>${item.ad}</span>
                          <span style="color:#ffffff; font-weight:bold;">${item.fiyat} TL</span> </li>`;
          });
          // Sepeti Boşalt Butonu Siyah-Beyaz Yapıldı
          html += '</ul><button onclick="sepetiBosalt()" style="width:100%; background:#ffffff; color:#000000; border:none; padding:10px; cursor:pointer; margin-top:10px; border-radius:5px; font-weight:bold;">Sepeti Boşalt</button>';
          cartContent.innerHTML = html;
      }
      localStorage.setItem('bli_sepet', JSON.stringify(sepet));
  }

  function sepetiBosalt() {
      sepet = [];
      sepetiGuncelle();
  }

  // MENÜ KONTROLLERİ
  const hamburger = document.getElementById("hamburger");
  const sideMenu = document.getElementById("sideMenu");
  const cartBtn = document.getElementById("cartBtn");
  const cartSidebar = document.getElementById("cartSidebar");
  const closeCart = document.getElementById("closeCart");

  hamburger.addEventListener("click", (e) => {
    e.stopPropagation();
    sideMenu.classList.toggle("open");
    cartSidebar.classList.remove("open");
  });

  cartBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    cartSidebar.classList.toggle("open");
    sideMenu.classList.remove("open");
  });

  closeCart.addEventListener("click", () => {
    cartSidebar.classList.remove("open");
  });

  document.addEventListener("click", (e) => {
    if (!sideMenu.contains(e.target) && !hamburger.contains(e.target)) sideMenu.classList.remove("open");
    if (!cartSidebar.contains(e.target) && !cartBtn.contains(e.target)) cartSidebar.classList.remove("open");
  });

  // SAYFA YÜKLENDİĞİNDE ÇALIŞACAKLAR
  window.onload = function() {
    sepetiGuncelle();
    
    // PWA Kaydı
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // Başvuru Kontrol
    const kayitliVeri = localStorage.getItem("bli_basvuru_tamamlandi");
    if (kayitliVeri) {
      const data = JSON.parse(kayitliVeri);
      const bBtn = document.getElementById("nav-basvuru");
      const dBtn = document.getElementById("nav-durum");
      if (bBtn && dBtn) {
        bBtn.style.display = "none";
        dBtn.style.display = "block";
        dBtn.onclick = () => alert("BAŞVURU KAYDINIZ\nDurum: İNCELENİYOR ⏳");
      }
    }
  }
</script>

</body>
</html>
