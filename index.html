<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLI Esports | Official</title>
  <link rel="icon" type="image/png" href="logo1616.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Navbar ikonlarını yan yana düzgün dizmek için */
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .cart-wrapper { position: relative; cursor: pointer; }
    #cart-count { position: absolute; top: -10px; right: -10px; background: #ff0000; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    .nav-icon { cursor: pointer; transition: 0.3s; }
    .nav-icon:hover { color: #ff0000; }
  </style>
</head> 
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header class="navbar">
  <div class="nav-right">
    <div class="cart-wrapper" id="cartBtn">
      <i class="fa-solid fa-cart-shopping nav-icon"></i>
      <span id="cart-count">0</span>
    </div>
    <i class="fa-solid fa-magnifying-glass nav-icon"></i>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<section class="hero-wrapper">
    <a href="ürünler/mouse/bliv1pro/" class="hero-link">
        <img src="v1pro-hero.jpg" alt="V1 PRO Karşınızda" class="hero-img">
        <div class="hero-content">
            <h2>V1 PRO <br> <span>KARŞINIZDA</span></h2>
            <div class="hero-btn">ŞİMDİ KEŞFET</div>
        </div>
    </a>
</section>
<nav class="side-menu" id="sideMenu">
...
  <div class="nav-left">
    <img src="logo1616.png" alt="BLI Logo">
  </div>
  <div class="nav-right">
    <div class="cart-wrapper" id="cartBtn">
      <i class="fa-solid fa-cart-shopping nav-icon"></i>
      <span id="cart-count">0</span>
    </div>

    <i class="fa-solid fa-magnifying-glass nav-icon"></i>

    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>
  
<nav class="side-menu" id="sideMenu">
  <a href="#">Giriş Yap</a>
  <a href="#">Kayıt Ol</a>
  <a href="ürünler/mouse/">Ürünlerimiz</a>
  <a href="basvuru/index.html" id="nav-basvuru" style="color: #ff0000; font-weight: bold; display: block;">Başvuru Yap</a>
  <a href="javascript:void(0)" id="nav-durum" style="color: #00ff00; font-weight: bold; display: none;">Başvuruyu Görüntüle</a>
  
  <a href="#">Destek</a>
</nav>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>SEPETİM</h3>
        <i class="fa-solid fa-xmark close-cart" id="closeCart"></i>
    </div>
    <div class="cart-content">
        <p>Sepetiniz şuan boş.</p>
    </div>
</div>

<main class="content">
  <h1>BLI ESPORTS</h1>
  <p>Sitemiz yakın zamanda kullanıma açılacaktır.</p>
  <a href="detayli-bilgi/index.html" class="btn">Detaylı Bilgi</a>
</main>

<footer class="footer">
  <span>Sosyal medya hesaplarımız</span>
  <div class="socials">
    <a href="https://www.instagram.com/bliesportts/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://www.youtube.com/@BLIESPORTS" target="_blank"><i class="fa-brands fa-youtube"></i></a>
  </div>
  <small>© 2026 BLI Esports</small>
</footer>

<script>
  const hamburger = document.getElementById("hamburger");
  const sideMenu = document.getElementById("sideMenu");
  const basvuruBtn = document.getElementById("nav-basvuru");
  const durumBtn = document.getElementById("nav-durum");
  const cartBtn = document.getElementById("cartBtn");
  const cartSidebar = document.getElementById("cartSidebar");
  const closeCart = document.getElementById("closeCart");

  // HAMBURGER MENÜ
  hamburger.addEventListener("click", (e) => {
    e.stopPropagation();
    sideMenu.classList.toggle("open");
    cartSidebar.classList.remove("open");
  });

  // SEPET
  cartBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    cartSidebar.classList.toggle("open");
    sideMenu.classList.remove("open");
  });

  closeCart.addEventListener("click", () => {
    cartSidebar.classList.remove("open");
  });

  document.addEventListener("click", (e) => {
    if (!sideMenu.contains(e.target) && !hamburger.contains(e.target)) {
      sideMenu.classList.remove("open");
    }
    if (!cartSidebar.contains(e.target) && !cartBtn.contains(e.target)) {
      cartSidebar.classList.remove("open");
    }
  });

  // BAŞVURU KONTROL
  window.onload = function() {
    const kayitliVeri = localStorage.getItem("bli_basvuru_tamamlandi");
    if (kayitliVeri) {
      const data = JSON.parse(kayitliVeri);
      basvuruBtn.style.display = "none";
      durumBtn.style.display = "block";
      durumBtn.onclick = () => {
        alert("BAŞVURU KAYDINIZ\n--------------------------\nİsim: " + data.ad + " " + data.soyad + "\nE-posta: " + data.email + "\nOyun: " + data.oyun + "\n\nDurum: İNCELENİYOR ⏳");
      };
    }
  }
</script>

</body>
</html>
