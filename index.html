<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLI Esports | Official</title>
  <link rel="icon" type="image/png" href="logo16.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Navbar ve Genel İkon Düzeni */
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .cart-wrapper { position: relative; cursor: pointer; }
    #cart-count { position: absolute; top: -10px; right: -10px; background: #ff0000; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    
    /* EN ALTTAKİ UZUN İNDİRİM BANNER'I (NAVBAR GİBİ) */
    .bottom-banner {
        width: 100%;
        background: #e60000; /* BLI Kırmızısı */
        padding: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        border-top: 2px solid #fff;
        margin-top: 150px; /* İçerikle arasında boşluk bırakır */
    }

    .banner-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 90%;
        max-width: 1200px;
        color: white;
    }

    .banner-text h2 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 1px;
        margin: 0;
    }

    .banner-text p {
        font-size: 14px;
        margin: 5px 0 0 0;
        opacity: 0.9;
    }

    .banner-btn {
        background: white;
        color: #e60000;
        padding: 12px 30px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 5px;
        text-transform: uppercase;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .banner-btn:hover {
        background: #000;
        color: #fff;
        transform: scale(1.05);
    }

    @media (max-width: 768px) {
        .banner-content { flex-direction: column; text-align: center; gap: 15px; }
        .banner-text h2 { font-size: 18px; }
    }
  </style>
</head> 
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header class="navbar">
  <div class="nav-left">
    <img src="logo.jpeg" alt="BLI Logo">
  </div>
  <div class="nav-right">
