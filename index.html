<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI Esports | Official Pro Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #000000;
            --pure-white: #ffffff;
            --accent-red: #ff3333;
            --bg-light-gray: #f8f8f8;
            --transition: all 0.4s ease;
            --card-radius: 24px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--pure-white);
            color: var(--primary-black);
            overflow-x: hidden;
        }
        button { cursor: pointer; font-family: inherit; }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 80px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .nav-logo img { height: 50px; }
        .nav-tools { display: flex; gap: 16px; }
        .tool-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            transition: var(--transition);
        }
        .tool-btn:hover { background: var(--bg-light-gray); }
        .cart-badge {
            position: absolute;
            top: 8px; right: 8px;
            background: var(--accent-red);
            color: white;
            font-size: 10px; font-weight: bold;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
        }

        /* Side Cart Panel */
        .global-dimmer {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1900;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .panel {
            position: fixed; top: 0; right: -100%;
            width: 420px; height: 100vh;
            background: white;
            z-index: 2000;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 60px 40px;
            display: flex; flex-direction: column;
        }
        .panel.active { right: 0; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .panel-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 26px;
        }
        .cart-item {
            display: flex;
            gap: 20px;
            padding: 18px;
            background: var(--bg-light-gray);
            border-radius: 18px;
            margin-bottom: 16px;
        }
        .cart-item img {
            width: 90px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px;
        }
        .item-info { flex: 1; }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        .qty-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--primary-black);
            color: white;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .qty-btn:hover { background: var(--accent-red); }
        .btn-checkout {
            margin-top: auto;
            width: 100%;
            padding: 22px;
            background: var(--primary-black);
            color: white;
            border-radius: 20px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 17px;
            transition: var(--transition);
        }
        .btn-checkout:hover {
            background: var(--accent-red);
            transform: translateY(-3px);
        }

        /* Main Content - Banner */
        main {
            margin-top: 100px;
            padding: 0 5% 80px;
        }
        .banner {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--card-radius);
            overflow: hidden;
            margin-bottom: 40px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .banner img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 1.8s ease;
        }
        .banner:hover img { transform: scale(1.05); }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 9999;
        }
        .toast {
            background: #111;
            color: white;
            padding: 18px 30px;
            border-radius: 16px;
            margin-top: 12px;
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            animation: slideIn 0.4s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); }
            to   { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="logo1616.png" alt="BLI">
        </div>
        <div class="nav-tools">
            <button class="tool-btn" onclick="openCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <!-- Dimmer -->
    <div class="global-dimmer" id="dimmer" onclick="closeCart()"></div>

    <!-- Cart Panel -->
    <div class="panel" id="cartPanel">
        <div class="panel-header">
            <h2>SEPET</h2>
            <button onclick="closeCart()" style="font-size:28px; color:#555;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="cartItems" style="flex:1; overflow-y:auto;"></div>

        <div style="margin-top:auto; padding-top:30px;">
            <div style="display:flex; justify-content:space-between; font-size:18px; margin-bottom:24px;">
                <span style="color:#555;">TOPLAM</span>
                <span id="cartTotal" style="font-family:'Orbitron'; font-weight:900; color:var(--accent-red);">0.00 TL</span>
            </div>
            <button class="btn-checkout">ÖDEMEYE GEÇ</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Banners (örnek) -->
    <main>
        <div class="banner" onclick="addToCart(101)">
            <img src="v1pro-banner.png" alt="V1 Pro Mouse">
        </div>
        <div class="banner" onclick="addToCart(102)">
            <img src="b_Sağ_alttaki_gemini_f.jpeg" alt="Elite Jersey">
        </div>
    </main>

    <script>
        // Ürün veritabanı (sadece id, isim, fiyat, resim)
        const products = {
            101: { name: "BLI V1 PRO MOUSE", price: 1899, img: "v1pro-banner.png" },
            102: { name: "ELITE JERSEY V2",   price: 749,  img: "b_Sağ_alttaki_gemini_f.jpeg" }
        };

        // Sepet (localStorage'dan yükle)
        let cart = JSON.parse(localStorage.getItem('bli_cart') || '[]');

        function saveCart() {
            localStorage.setItem('bli_cart', JSON.stringify(cart));
            updateBadgeAndTotal();
        }

        function updateBadgeAndTotal() {
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');

            let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            let totalPrice = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            countEl.textContent = totalItems;
            totalEl.textContent = totalPrice.toFixed(2) + " TL";
        }

        function addToCart(productId) {
            const prod = products[productId];
            if (!prod) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ id: productId, ...prod, quantity: 1 });
            }

            saveCart();
            showToast(`${prod.name} sepete eklendi`);
            renderCart();
            openCart();
        }

        function changeQty(index, delta) {
            const item = cart[index];
            item.quantity = Math.max(1, item.quantity + delta);
            saveCart();
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (!container) return;

            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:80px 0; color:#aaa;">Sepet boş</div>';
                return;
            }

            container.innerHTML = '';
            cart.forEach((item, i) => {
                const subtotal = item.price * item.quantity;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-info">
                            <div style="font-weight:700; margin-bottom:6px;">${item.name}</div>
                            <div style="color:var(--accent-red); font-weight:800;">${item.price} TL</div>
                            <div class="quantity-control">
                                <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
                                <span style="min-width:30px; text-align:center; font-weight:600;">${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                            </div>
                        </div>
                        <div style="text-align:right; min-width:80px;">
                            <div style="font-weight:700; color:#333;">${subtotal} TL</div>
                            <button onclick="removeItem(${i})" style="margin-top:8px; color:#777; background:none; border:none; font-size:16px;">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function openCart() {
            document.getElementById('cartPanel').classList.add('active');
            document.getElementById('dimmer').style.display = 'block';
            setTimeout(() => document.getElementById('dimmer').style.opacity = '1', 10);
            renderCart();
        }

        function closeCart() {
            document.getElementById('cartPanel').classList.remove('active');
            document.getElementById('dimmer').style.opacity = '0';
            setTimeout(() => document.getElementById('dimmer').style.display = 'none', 500);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        // Sayfa yüklendiğinde
        window.addEventListener('load', () => {
            updateBadgeAndTotal();
        });
    </script>
</body>
</html>
