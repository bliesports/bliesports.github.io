<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI Esports | Home</title>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- FONTS & ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@100;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo1616.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .navbar.scrolled {
            height: 75px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .nav-logo img {
            height: 52px;
            cursor: pointer;
        }

        .nav-tools {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: none;
        }

        .tool-btn:hover {
            background: #f0f0f0;
            color: #ff3333;
        }

        .hamburger {
            width: 55px;
            height: 55px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .hamburger:hover {
            background: #f0f0f0;
        }

        .hamburger span {
            width: 26px;
            height: 2px;
            background: #000;
            border-radius: 2px;
        }

        .cart-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff3333;
            color: white;
            font-size: 10px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-pc-download {
            background: #000;
            color: #fff;
            padding: 12px 22px;
            border-radius: 14px;
            font-family: 'Orbitron';
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-left: 12px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-pc-download:hover {
            background: #ff3333;
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .btn-pc-download { display: none !important; }
        }

        /* --- PANEL (MENU & CART) --- */
        .global-dimmer {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1900;
            display: none;
            opacity: 0;
            transition: 0.3s;
        }

        .panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 450px;
            height: 100vh;
            background: #fff;
            z-index: 2000;
            transition: 0.4s ease-out;
            display: flex;
            flex-direction: column;
            padding: 60px 40px;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 500px) {
            .panel { width: 100%; }
        }

        .panel.active {
            right: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .panel-header h2 {
            font-family: 'Orbitron';
            font-size: 24px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 24px;
            background: #f8f8f8;
            border-radius: 16px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            color: #000;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .menu-link:hover {
            background: #000;
            color: #fff;
            transform: translateX(8px);
        }

        .menu-link i {
            color: #ff3333;
            width: 24px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: #f8f8f8;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .btn-premium {
            width: 100%;
            padding: 18px;
            background: #000;
            color: #fff;
            border-radius: 16px;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
            border: none;
            margin-top: 20px;
        }

        .btn-premium:hover {
            background: #ff3333;
        }

        /* --- ANA BANNER GRID (SOL YATAY, ORTA YATAY, SAĞ DİKEY) --- */
        .content-engine {
            margin-top: 110px;
            padding: 0 4%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .banner-stack {
            display: grid;
            grid-template-columns: 1fr 1fr 0.8fr;
            gap: 20px;
            height: 550px;
        }

        .pro-banner {
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            background: #111;
        }

        .pro-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s;
        }

        .pro-banner:hover img {
            transform: scale(1.05);
        }

        /* Mobil Düzen */
        @media (max-width: 900px) {
            .content-engine {
                margin-top: 90px;
            }
            .banner-stack {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 15px;
            }
            .pro-banner {
                height: 220px;
            }
        }

        /* --- FOOTER --- */
        .footer-terminal {
            background: #050505;
            color: #fff;
            padding: 80px 6% 40px;
            margin-top: 60px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-col h4 {
            font-family: 'Orbitron';
            color: #ff3333;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .footer-list {
            list-style: none;
        }

        .footer-list li {
            margin-bottom: 12px;
        }

        .footer-list a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .footer-list a:hover {
            color: #fff;
            padding-left: 5px;
        }

        .legal-box {
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #444;
        }

        /* --- SEARCH PORTAL --- */
        .search-portal {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #fff;
            z-index: 2500;
            padding: 120px 10%;
            transition: 0.4s;
            opacity: 0;
        }

        .search-portal.active {
            top: 0;
            opacity: 1;
        }

        .search-close-top {
            position: absolute;
            top: 40px;
            right: 6%;
            font-size: 40px;
            cursor: pointer;
        }

        .search-field-wrapper {
            display: flex;
            gap: 20px;
            border-bottom: 3px solid #000;
            padding-bottom: 15px;
        }

        .search-field-wrapper input {
            flex: 1;
            font-size: 40px;
            font-weight: 900;
            font-family: 'Orbitron';
            border: none;
            outline: none;
            background: none;
        }

        .search-results-box {
            margin-top: 40px;
            display: grid;
            gap: 20px;
        }

        /* Loader */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .toast-msg {
            background: #000;
            color: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            margin-top: 10px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .tool-btn {
            position: relative;
        }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="loader-overlay">
    <img src="logo1616.png" style="height:65px; margin-bottom:20px;">
    <div style="width:150px; height:3px; background:#eee; border-radius:10px; overflow:hidden;">
        <div id="load-progress-bar" style="width:0%; height:100%; background:#000; transition:0.2s;"></div>
    </div>
</div>

<!-- SEARCH -->
<div class="search-portal" id="searchPortal">
    <div class="search-close-top" onclick="toggleSearch()">✕</div>
    <div class="search-field-wrapper">
        <i class="fas fa-search" style="font-size:30px;"></i>
        <input type="text" id="searchInput" placeholder="ARA...">
    </div>
    <div id="searchResults" class="search-results-box"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="nav-logo" onclick="location.href='index.html'">
        <img src="logo1616.png" alt="BLI ESPORTS">
    </div>
    <div class="nav-tools">
        <a href="https://github.com/bliesports/bliesports.github.io/releases/download/v1.0.0/BLI.CLIENT_0.1.0_x64_en-US.msi" class="btn-pc-download">
            <i class="fab fa-windows"></i> ŞİMDİ İNDİR
        </a>
        <button class="tool-btn" onclick="toggleSearch()"><i class="fas fa-search"></i></button>
        <button class="tool-btn" onclick="openPanel('cartPanel')">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartCount">0</span>
        </button>
        <button class="tool-btn" onclick="window.location.href='http://account.bliesports.com.tr/'"><i class="fas fa-user"></i></button>
        <div class="hamburger" onclick="openPanel('menuPanel')">
            <span></span><span></span><span></span>
        </div>
    </div>
</nav>

<!-- DIMMER -->
<div class="global-dimmer" id="globalDimmer" onclick="closeAllPanels()"></div>

<!-- MENU PANEL -->
<aside class="panel" id="menuPanel">
    <div class="panel-header">
        <h2>MENU</h2>
        <button class="tool-btn" onclick="closeAllPanels()"><i class="fas fa-times"></i></button>
    </div>
    <div>
        <a href="index.html" class="menu-link"><i class="fas fa-home"></i> ANA SAYFA</a>
        <a href="/ürünler/index.html" class="menu-link"><i class="fas fa-store"></i> TÜM ÜRÜNLER</a>
        <a href="https://bliesports.com.tr/games" class="menu-link"><i class="fas fa-gamepad"></i> OYUNLAR</a>
        <a href="/basvuru/index.html" class="menu-link"><i class="fas fa-user-plus"></i> BİZE KATIL</a>
        <a href="/bliclient/index.html" class="menu-link"><i class="fas fa-microchip"></i> BLI CLIENT</a>
        <a href="http://ai.bliesports.com.tr" class="menu-link"><i class="fas fa-robot"></i> BLI AI</a>
    </div>
</aside>

<!-- CART PANEL -->
<aside class="panel" id="cartPanel">
    <div class="panel-header">
        <h2>SEPETİN</h2>
        <button class="tool-btn" onclick="closeAllPanels()"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItems" style="flex:1; overflow-y:auto;"></div>
    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
        <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">
            <span>TOPLAM</span>
            <span id="cartTotal">0 TL</span>
        </div>
        <button class="btn-premium" onclick="checkout()">SİPARİŞ TAMAMLA</button>
    </div>
</aside>

<!-- ANA İÇERİK -->
<main class="content-engine">
    <div class="banner-stack">
        <!-- SOL: YATAY (MOUSE) -->
        <div class="pro-banner" onclick="location.href='/ürünler/mouse/bliv1pro/index.html'">
            <img src="v1pro-banner.png" alt="BLI V1 PRO">
        </div>
        <!-- ORTA: YATAY (FORMA) -->
        <div class="pro-banner" onclick="location.href='/ürünler/forma/classic/index.html'">
            <img src="b_Sağ_alttaki_gemini_f.jpeg" alt="BLI ELITE JERSEY">
        </div>
        <!-- SAĞ: DİKEY (EKSTRA) -->
        <div class="pro-banner" onclick="location.href='/ürünler/ekstra/index.html'">
            <img src="file_0000000027a071fd8925b258d38214b4.png" alt="BLI EXTRA">
        </div>
    </div>
</main>

<!-- FOOTER -->
<footer class="footer-terminal">
    <div class="footer-grid">
        <div class="footer-col">
            <img src="logo1616.png" style="height:35px; filter:invert(1); margin-bottom:20px;">
            <p style="color:#666; font-size:13px;">Profesyonel espor ekipmanları.</p>
        </div>
        <div class="footer-col">
            <h4>MAĞAZA</h4>
            <ul class="footer-list">
                <li><a href="/ürünler/mouse/index.html">Mouse Modelleri</a></li>
                <li><a href="/ürünler/forma/index.html">Resmi Formalar</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h4>YARDIM</h4>
            <ul class="footer-list">
                <li><a href="#">Sipariş Takip</a></li>
                <li><a href="/contact-us/index.html">İletişim</a></li>
                <li><a href="/privacy-poliyc/index.html">Gizlilik</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h4>OYUNLAR</h4>
            <ul class="footer-list">
                <li><a href="https://astrangeman.bliesports.com.tr">A STRANGE MAN</a></li>
                <li><a href="https://goldgun.bliesports.com.tr">GOLD GUN</a></li>
            </ul>
        </div>
    </div>
    <div class="legal-box">
        <span>© 2026 BLI ESPORTS</span>
        <div><i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i></div>
    </div>
</footer>

<script>
    // FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8",
        authDomain: "bliesports.firebaseapp.com",
        projectId: "bliesports",
        storageBucket: "bliesports.firebasestorage.app",
        messagingSenderId: "880767104142",
        appId: "1:880767104142:web:5edbe111f42f16ab1545df"
    };
    firebase.initializeApp(firebaseConfig);

    // SEPET
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        const countSpan = document.getElementById('cartCount');
        const totalSpan = document.getElementById('cartTotal');
        let total = 0;

        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#aaa;">Sepet boş</div>';
            if (countSpan) countSpan.innerText = '0';
            if (totalSpan) totalSpan.innerText = '0 TL';
            return;
        }

        container.innerHTML = '';
        cart.forEach((item, idx) => {
            total += item.price;
            container.innerHTML += `
                <div class="cart-item">
                    <img src="${item.img}" style="width:60px; height:60px; object-fit:cover; border-radius:12px;">
                    <div style="flex:1">
                        <strong>${item.name}</strong><br>
                        <span style="color:#ff3333">${item.price} TL</span>
                    </div>
                    <button onclick="removeFromCart(${idx})" style="background:none; border:none; font-size:18px;">🗑️</button>
                </div>
            `;
        });
        if (countSpan) countSpan.innerText = cart.length;
        if (totalSpan) totalSpan.innerText = total + ' TL';
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        saveCart();
    }

    function checkout() {
        window.location.href = "cart/index.html";
    }

    // PANEL
    function openPanel(id) {
        closeAllPanels();
        document.getElementById(id).classList.add('active');
        document.getElementById('globalDimmer').style.display = 'block';
        setTimeout(() => document.getElementById('globalDimmer').style.opacity = '1', 10);
    }

    function closeAllPanels() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const dimmer = document.getElementById('globalDimmer');
        dimmer.style.opacity = '0';
        setTimeout(() => dimmer.style.display = 'none', 300);
    }

    // SEARCH
    function toggleSearch() {
        const portal = document.getElementById('searchPortal');
        portal.classList.toggle('active');
        if (portal.classList.contains('active')) {
            document.getElementById('searchInput').focus();
        }
    }

    // LOADER & SCROLL
    window.addEventListener('load', () => {
        let width = 0;
        const bar = document.getElementById('load-progress-bar');
        const loader = document.getElementById('loader-overlay');
        const interval = setInterval(() => {
            width += Math.random() * 30;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
            if (bar) bar.style.width = width + '%';
        }, 80);
        updateCartUI();
    });

    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
    });

    window.addEventListener('focus', () => {
        cart = JSON.parse(localStorage.getItem('cart')) || [];
        updateCartUI();
    });
</script>
</body>
</html>
