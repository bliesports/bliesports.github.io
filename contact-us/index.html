<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI ESPORTS | Secure Operation Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray: #111111;
            --border: #222222;
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: var(--white); font-family: var(--font-main); overflow-x: hidden; }

        /* --- SİYAH BEYAZ NAVIGASYON --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6%; background: var(--black); 
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .logo { font-family: var(--font-tech); font-weight: 900; font-size: 22px; letter-spacing: 3px; }

        /* --- ANA KONTEYNER --- */
        .wrapper {
            max-width: 1200px;
            margin: 140px auto 100px;
            padding: 0 6%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
        }

        /* SOL TARAF: İLETİŞİM BİLGİLERİ (GERİ GELDİ) */
        .info-side h1 { font-family: var(--font-tech); font-size: 60px; font-weight: 900; line-height: 1; margin-bottom: 30px; }
        
        .contact-entry {
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: var(--transition);
            background: var(--gray);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .contact-entry:hover { border-color: var(--white); transform: translateX(10px); }
        .contact-entry i { font-size: 24px; color: var(--white); }
        .contact-entry span { font-family: 'JetBrains Mono'; font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
        .contact-entry h4 { font-family: var(--font-tech); font-size: 16px; letter-spacing: 1px; }

        /* SAĞ TARAF: FORMSPREE FORM */
        .form-side {
            background: var(--white);
            color: var(--black);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .field { margin-bottom: 25px; }
        .field label { display: block; font-family: var(--font-tech); font-size: 11px; font-weight: 900; margin-bottom: 10px; }
        
        .bli-input {
            width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 12px;
            background: #f9f9f9; font-family: var(--font-main); font-weight: 700; transition: var(--transition);
        }
        .bli-input:focus { border-color: var(--black); background: var(--white); outline: none; }

        .btn-send {
            width: 100%; padding: 22px; background: var(--black); color: var(--white);
            border: none; border-radius: 12px; font-family: var(--font-tech); font-weight: 900;
            cursor: pointer; transition: var(--transition);
        }
        .btn-send:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); opacity: 0.9; }

        /* --- ÖZEL KONUMLU CANLI DESTEK BALONU --- */
        .support-bubble {
            position: fixed;
            right: 40px;
            bottom: 120px; /* İstediğin özel konum */
            width: 65px;
            height: 65px;
            background: var(--white);
            color: var(--black);
            border-radius: 50% 50% 2px 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: var(--transition);
        }
        .support-bubble:hover { transform: scale(1.1) rotate(-10deg); }

        /* CANLI DESTEK PENCERESİ */
        .chat-ui {
            position: fixed; right: 40px; bottom: 200px; width: 330px;
            background: var(--white); color: var(--black); border-radius: 20px;
            display: none; flex-direction: column; overflow: hidden; z-index: 1002;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 2px solid var(--black);
        }
        .chat-ui.active { display: flex; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .chat-head { background: var(--black); color: var(--white); padding: 15px; font-family: var(--font-tech); font-size: 12px; display: flex; justify-content: space-between; }
        .chat-body { height: 280px; padding: 20px; background: #f0f0f0; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; font-size: 13px; max-width: 85%; line-height: 1.4; }
        .msg.bot { background: #ddd; align-self: flex-start; }
        .msg.user { background: var(--black); color: var(--white); align-self: flex-end; }
        .chat-foot { padding: 10px; display: flex; gap: 8px; border-top: 1px solid #eee; }
        .chat-foot input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        @media (max-width: 900px) {
            .wrapper { grid-template-columns: 1fr; margin-top: 100px; gap: 40px; }
            .support-bubble { bottom: 30px; right: 30px; }
            .chat-ui { right: 20px; bottom: 100px; width: calc(100% - 40px); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BLI ESPORTS</div>
        <div style="font-family: 'JetBrains Mono'; font-size: 10px; color: #444;">// MONOCHROME_MODE</div>
    </nav>

    <main class="wrapper">
        <div class="info-side">
            <h1>CONTACT<br>TERMINAL</h1>
            
            <div class="contact-entry">
                <i class="fa-solid fa-envelope"></i>
                <div>
                    <span>SİSTEM DESTEK</span>
                    <h4>support@bliesports.com.tr</h4>
                </div>
            </div>

            <div class="contact-entry">
                <i class="fa-solid fa-code"></i>
                <div>
                    <span>GELİŞTİRİCİ EKİBİ</span>
                    <h4>dev@bliesports.com.tr</h4>
                </div>
            </div>

            <div class="contact-entry">
                <i class="fa-solid fa-map-pin"></i>
                <div>
                    <span>MERKEZ ÜS</span>
                    <h4>İzmir, Türkiye</h4>
                </div>
            </div>
        </div>

        <div class="form-side">
            <form action="https://formspree.io/f/mvgzpboe" method="POST">
                <div class="field">
                    <label>OPERATÖR İSMİ</label>
                    <input type="text" name="name" class="bli-input" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="field">
                    <label>İLETİŞİM KODU (E-POSTA)</label>
                    <input type="email" name="email" class="bli-input" placeholder="mail@example.com" required>
                </div>
                <div class="field">
                    <label>OPERASYONEL MESAJ</label>
                    <textarea name="message" class="bli-input" rows="5" placeholder="Mesajınızı sisteme iletin..." required></textarea>
                </div>
                <button type="submit" class="btn-send">BAĞLANTI KUR</button>
            </form>
        </div>
    </main>

    <div class="support-bubble" onclick="toggleChat()">
        <i class="fa-solid fa-headset"></i>
    </div>

    <div class="chat-ui" id="chatWindow">
        <div class="chat-head">
            <span>BLI LIVE CHAT</span>
            <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="toggleChat()"></i>
        </div>
        <div class="chat-body" id="chatDisplay">
            <div class="msg bot">Merhaba Operatör. BLI Sistemine hoş geldin. Nasıl yardımcı olabilirim?</div>
        </div>
        <div class="chat-foot">
            <input type="text" id="chatIn" placeholder="Mesaj yazın...">
            <button onclick="sendMsg()" style="background:var(--black); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
        
        function sendMsg() {
            const input = document.getElementById('chatIn');
            const display = document.getElementById('chatDisplay');
            if(input.value.trim() === "") return;

            const u = document.createElement('div');
            u.className = 'msg user';
            u.innerText = input.value;
            display.appendChild(u);
            
            const text = input.value;
            input.value = "";
            display.scrollTop = display.scrollHeight;

            setTimeout(() => {
                const b = document.createElement('div');
                b.className = 'msg bot';
                b.innerText = "Operatör şu an meşgul. Lütfen yandaki iletişim formunu kullanın.";
                display.appendChild(b);
                display.scrollTop = display.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
