<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI | Contact Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --b: #000; --w: #fff; --g: #f4f4f4; --t: 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--w); color: var(--b); }

        /* --- CONTACT SECTION --- */
        .main { max-width: 1100px; margin: 100px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900; line-height: 0.9; margin-bottom: 20px; }
        .form-box { background: var(--b); padding: 40px; border-radius: 24px; color: var(--w); }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; outline: none; transition: var(--t); }
        input:focus, textarea:focus { border-color: var(--w); }
        button { width: 100%; padding: 18px; background: var(--w); border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: var(--t); }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* --- CANLI DESTEK BALONU --- */
        .chat-bubble { position: fixed; right: 40px; bottom: 120px; width: 65px; height: 65px; background: var(--b); color: var(--w); border-radius: 50% 50% 0 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 999; transition: var(--t); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .chat-bubble:hover { transform: scale(1.1); background: #222; }

        /* --- CHAT PENCERESİ --- */
        .chat-window { position: fixed; right: 40px; bottom: 200px; width: 320px; background: var(--w); border: 2px solid var(--b); border-radius: 20px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .chat-header { background: var(--b); color: var(--w); padding: 15px; font-family: 'Orbitron'; font-size: 12px; display: flex; justify-content: space-between; }
        .chat-body { height: 250px; padding: 15px; font-size: 14px; background: var(--g); overflow-y: auto; }
        .chat-msg { background: #ddd; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: fit-content; }
        .chat-footer { padding: 10px; display: flex; gap: 5px; }
        .chat-input { margin-bottom: 0; padding: 10px; font-size: 13px; background: var(--g); color: #000; border: 1px solid #eee; }
        .show { display: flex; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 800px) { .main { grid-template-columns: 1fr; margin: 60px auto; } .chat-bubble { bottom: 40px; right: 20px; } .chat-window { right: 20px; bottom: 120px; width: 280px; } }
    </style>
</head>
<body>

    <main class="main">
        <div>
            <h1>CONTACT<br>CORE</h1>
            <p style="color: #666; margin-top: 20px;">Sistem ile güvenli bağlantı kurun. Verileriniz şifreli olarak ana merkeze iletilir.</p>
        </div>

        <div class="form-box">
            <form action="https://formspree.io/f/mvgzpboe" method="POST">
                <input type="text" name="name" placeholder="OPERATÖR ADI" required>
                <input type="email" name="email" placeholder="E-POSTA" required>
                <textarea name="message" rows="5" placeholder="MESAJINIZ" required></textarea>
                <button type="submit">GÖNDER</button>
            </form>
        </div>
    </main>

    <div class="chat-bubble" onclick="toggleChat()">
        <i class="fa-solid fa-headset"></i>
    </div>

    <div class="chat-window" id="chatWin">
        <div class="chat-header">
            <span>BLI LIVE SUPPORT</span>
            <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="toggleChat()"></i>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-msg">Sisteme hoş geldin. Nasıl yardımcı olabilirim?</div>
        </div>
        <div class="chat-footer">
            <input type="text" class="chat-input" id="cInp" placeholder="Yazın...">
            <button style="width: 45px; padding: 10px;" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        function toggleChat() { document.getElementById('chatWin').classList.toggle('show'); }
        
        function sendMsg() {
            const inp = document.getElementById('cInp');
            const body = document.getElementById('chatBody');
            if(inp.value.trim() !== "") {
                const m = document.createElement('div');
                m.className = 'chat-msg';
                m.style.background = '#000';
                m.style.color = '#fff';
                m.style.marginLeft = 'auto';
                m.innerText = inp.value;
                body.appendChild(m);
                inp.value = "";
                body.scrollTop = body.scrollHeight;
                
                setTimeout(() => {
                    const r = document.createElement('div');
                    r.className = 'chat-msg';
                    r.innerText = "Operatör şu an meşgul, lütfen iletişim formunu kullanın.";
                    body.appendChild(r);
                    body.scrollTop = body.scrollHeight;
                }, 1000);
            }
        }
    </script>
</body>
</html>
