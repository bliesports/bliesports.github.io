<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLI ESPORTS | Secure Contact</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #ff3333; /* Sadece küçük detaylar için */
            --glass: rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: #fff; border-bottom: 2px solid #000; z-index: 1000;
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; letter-spacing: 2px; }

        /* --- CONTACT MAIN --- */
        .wrapper { max-width: 1200px; margin: 150px auto 100px; padding: 0 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; }

        .info-box h1 { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .info-box p { font-size: 18px; margin-bottom: 40px; color: #555; }

        /* --- FORMSPREE READY FORM --- */
        .form-container { background: #000; padding: 40px; border-radius: 20px; color: #fff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-family: 'Orbitron'; font-size: 10px; margin-bottom: 8px; color: #aaa; }
        
        .bli-input {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333; 
            color: #fff; border-radius: 8px; font-family: 'Inter'; transition: 0.3s;
        }
        .bli-input:focus { border-color: #fff; outline: none; }

        .send-btn {
            width: 100%; padding: 18px; background: #fff; color: #000; 
            border: none; border-radius: 8px; font-family: 'Orbitron'; 
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .send-btn:hover { background: var(--accent); color: #fff; }

        /* --- ÖZEL YARDIM BALONCUĞU (İSTEDİĞİN KONUM) --- */
        .special-bubble {
            position: fixed;
            right: 40px;
            bottom: 120px; /* Alttan biraz yukarıda, tam ortada değil */
            width: 60px;
            height: 60px;
            background: #000;
            color: #fff;
            border-radius: 50% 50% 0 50%; /* Baloncuk formu */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
        }
        .special-bubble:hover { transform: scale(1.1) rotate(-10deg); background: var(--accent); }
        
        /* Baloncuk üzerindeki ipucu */
        .bubble-hint {
            position: absolute; right: 80px; background: #000; color: #fff;
            padding: 8px 15px; border-radius: 10px; font-size: 12px;
            white-space: nowrap; pointer-events: none; opacity: 0; transition: 0.3s;
        }
        .special-bubble:hover .bubble-hint { opacity: 1; right: 75px; }

        @media (max-width: 900px) {
            .wrapper { grid-template-columns: 1fr; gap: 50px; }
            .special-bubble { bottom: 100px; right: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BLI ESPORTS</div>
        <div style="font-family:'Orbitron'; font-size:10px;">// SYSTEM_STATUS: ONLINE</div>
    </nav>

    <div class="special-bubble" onclick="alert('Buraya sonra eklenecek fonksiyon gelecek!')">
        <i class="fa-solid fa-comment-dots"></i>
        <div class="bubble-hint">Hızlı Destek Hattı</div>
    </div>

    <main class="wrapper">
        <div class="info-box">
            <h1>CONTACT<br>CORE</h1>
            <p>Siyah-beyaz minimal düzen. Formspree üzerinden mesajlar doğrudan mail kutuna düşer.</p>
            
            <div style="margin-top:20px;">
                <div style="margin-bottom:15px; font-weight:800;"><i class="fa-solid fa-envelope" style="margin-right:10px;"></i> support@bliesports.com.tr</div>
                <div style="font-weight:800;"><i class="fa-solid fa-location-dot" style="margin-right:10px;"></i> Izmir, Turkey</div>
            </div>
        </div>

        <div class="form-container">
            <form action="https://formspree.io/f/KENDI_ID_BURAYA" method="POST">
                <div class="form-group">
                    <label>TAM ADINIZ</label>
                    <input type="text" name="name" class="bli-input" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>E-POSTA ADRESİ</label>
                    <input type="email" name="_replyto" class="bli-input" placeholder="mail@ornek.com" required>
                </div>

                <div class="form-group">
                    <label>MESAJINIZ</label>
                    <textarea name="message" class="bli-input" rows="6" placeholder="Bize ne iletmek istersiniz?" required></textarea>
                </div>

                <button type="submit" class="send-btn">MESAJI GÖNDER</button>
            </form>
        </div>
    </main>

</body>
</html>
